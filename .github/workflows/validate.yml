name: validate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  packer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-packer@main
      - run: packer fmt -check -recursive packer/
      - working-directory: packer/k8s-node
        run: |
          packer init .
          packer validate \
            -var "proxmox_url=https://localhost:8006/api2/json" \
            -var "proxmox_api_token_id=ci@pam!ci" \
            -var "proxmox_api_token_secret=00000000-0000-0000-0000-000000000000" \
            -var "proxmox_node=ci" \
            -var "iso_checksum=none" \
            .

  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4
      - run: terraform fmt -check -recursive terraform/
      - working-directory: terraform/aws
        run: |
          terraform init -backend=false
          terraform validate
      - working-directory: terraform/hosts/homelabk8s01
        run: |
          terraform init -backend=false
          terraform validate

  kubernetes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: pip install yamllint
      - run: yamllint -c .yamllint.yml k8s/
      - uses: bmuschko/setup-kubeconform@v1
      - run: |
          kubeconform -strict \
            -kubernetes-version 1.31.4 \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            -skip Kustomization \
            -skip CustomResourceDefinition \
            -ignore-filename-pattern '.*kustomization\.(yml|yaml)$' \
            -ignore-filename-pattern '.*config\.yml$' \
            -ignore-filename-pattern '.*values\.yml$' \
            -ignore-filename-pattern '.*slack-app-manifest\.json$' \
            -summary \
            k8s/

  trivy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Scan k8s manifests for misconfigurations
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: config
          scan-ref: k8s/
          severity: CRITICAL,HIGH
          exit-code: "1"
          format: table
          trivyignores: .trivyignore

  ansible:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: pip install ansible-core ansible-lint
      - run: ansible-galaxy collection install -r ansible/requirements.yml
      - working-directory: ansible
        run: ansible-lint
