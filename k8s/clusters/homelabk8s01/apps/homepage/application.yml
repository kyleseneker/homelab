apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: homepage
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://bjw-s-labs.github.io/helm-charts
    chart: app-template
    targetRevision: 4.6.2
    helm:
      valuesObject:
        defaultPodOptions:
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            runAsNonRoot: true

        controllers:
          main:
            serviceAccount:
              identifier: homepage
            containers:
              main:
                image:
                  repository: ghcr.io/gethomepage/homepage
                  tag: v1.11.0
                env:
                  HOMEPAGE_ALLOWED_HOSTS: "home.homelab.local"
                envFrom:
                  - secretRef:
                      name: homepage-secrets
                      optional: true
                securityContext:
                  allowPrivilegeEscalation: false
                  readOnlyRootFilesystem: true
                  capabilities:
                    drop:
                      - ALL
                resources:
                  requests:
                    cpu: 25m
                    memory: 64Mi
                  limits:
                    memory: 256Mi
                probes:
                  liveness:
                    enabled: true
                  readiness:
                    enabled: true
                  startup:
                    enabled: true

        serviceAccount:
          homepage: {}

        service:
          main:
            controller: main
            ports:
              http:
                port: 3000

        route:
          main:
            enabled: true
            kind: HTTPRoute
            parentRefs:
              - group: gateway.networking.k8s.io
                kind: Gateway
                name: homelab-gateway
                namespace: default
                sectionName: https
            hostnames:
              - home.homelab.local
            rules:
              - matches:
                  - path:
                      type: PathPrefix
                      value: /
                backendRefs:
                  - name: homepage
                    port: 3000

        persistence:
          tmp:
            type: emptyDir
            globalMounts:
              - path: /tmp
          config:
            type: emptyDir
            globalMounts:
              - path: /app/config
          config-files:
            type: configMap
            name: homepage-config
            globalMounts:
              - path: /app/config/services.yaml
                subPath: services.yaml
                readOnly: true
              - path: /app/config/settings.yaml
                subPath: settings.yaml
                readOnly: true
              - path: /app/config/widgets.yaml
                subPath: widgets.yaml
                readOnly: true
              - path: /app/config/bookmarks.yaml
                subPath: bookmarks.yaml
                readOnly: true

  destination:
    server: https://kubernetes.default.svc
    namespace: arr
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - ServerSideDiff=true
