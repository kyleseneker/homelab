apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: openclaw-ops
  namespace: openclaw
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: openclaw-ops
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: openclaw-media
  namespace: openclaw
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: openclaw-media
