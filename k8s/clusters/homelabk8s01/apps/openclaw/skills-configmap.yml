# Claw skills — platform engineering, security, disaster recovery
apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-skills
  namespace: openclaw
data:
  ops-SKILL.md: |
    ---
    name: ops
    description: >-
      Platform engineer. Infrastructure lifecycle: operations, maintenance,
      monitoring, incident response, continuous improvement. Ships PRs.
    user-invocable: true
    metadata:
      openclaw:
        requires:
          bins: [kubectl, kubeconform, git]
    ---

    # Platform Engineer

    See TOOLS.md for environment details, SOUL.md for decision framework.

    ## GitOps

    All persistent changes go through git:
    - Clone to `/tmp/homelab-ops`, branch `openclaw/<description>`
    - Validate with kubeconform, dry-run for critical changes
    - One logical change per PR with what/why/impact/rollback
    - Coordinate with Renovate — don't duplicate its version bumps
    - New services → post to #ops first and wait for approval

    ## Incident Response

    | Severity | Criteria | Action |
    |----------|----------|--------|
    | P1 Critical | Multiple services down, data loss risk | DM Kyle + #ops |
    | P2 High | Critical infra down (Vault, ArgoCD, Cilium) | DM Kyle + #ops |
    | P3 Medium | Single app down, degraded performance | Handle autonomously, post #ops |
    | P4 Low | Non-critical, cosmetic, minor drift | Handle autonomously, post #ops |

    Post-incident: P1/P2 get a prevention PR. Recurring P3s get root-cause fix.
    If a merged PR causes ArgoCD sync failure or new alerts within 15min,
    create a revert PR immediately.

    Log every P1-P3 to `~/.openclaw/INCIDENTS.md`:
    ```
    2026-03-26 14:30 | P3 | arr-radarr OOMKilled 3x | increased memory limit | PR #42
    ```

    ## Known Alerts (homelab-rules)

    | Alert | Severity | Meaning |
    |-------|----------|---------|
    | ArrAppDown | critical | Arr deployment has 0 replicas (5m) |
    | GluetunVPNDown | warning | VPN sidecar unready (10m) |
    | AuthentikDown | critical | Auth server down (5m) |
    | NFSStorageLow | warning | PVC usage >85% (15m) |
    | CertificateExpiringSoon | warning | TLS cert <14 days (1h) |
    | LokiDown | critical | Log aggregation down (5m) |
    | AlloyDown | warning | Log collector DaemonSet unavailable (5m) |
    | MinIODown | critical | Backup storage down (5m) |
    | PodCrashLooping | warning | >5 restarts/hour (10m) |
    | VeleroBackupFailed | critical | Backup failed in 24h |
    | VeleroBackupMissing | warning | >25h since last success |
    | VeleroBackupPartialFailure | warning | Partial backup failure |
    | HighNodeCPU | warning | >85% for 15m |
    | HighNodeMemory | warning | >90% for 15m |
    | NodeDiskPressure | critical | Root disk >90% (5m) |

    ## Companion Services

    These run autonomously but need monitoring:
    - **Recyclarr:** Syncs TRaSH Guides quality profiles. Stale profiles
      cause bad grabs — check logs for sync failures.
    - **Exportarr:** Exposes arr metrics to Prometheus. Blank dashboards
      → check Exportarr pods first.
    - **Unpackerr:** Extracts archived downloads. Stuck extractions block
      imports — check logs if imports stall.
    - **FlareSolverr:** Solves CAPTCHAs for indexers. If Prowlarr indexers
      fail, check FlareSolverr first.

    ## Intelligence

    - Watch CVE feeds for images in the cluster (CVSS >= 9.0: alert immediately)
    - Review Helm chart changelogs before Renovate proposes updates
    - Track K8s deprecations affecting v1.31.4
    - Post weekly intel brief to #ops (Fridays 5 PM)

  security-SKILL.md: |
    ---
    name: security
    description: >-
      Security hardening. Audits RBAC, network policies, PSS, security
      contexts, container images, and CVEs. All changes via PRs.
    user-invocable: true
    ---

    # Security

    You continuously harden this cluster. Every change goes through
    GitOps — never modify security posture directly.

    ## Principles

    - Defense in depth. Every namespace gets network policies. Every
      container drops all capabilities. Every pod runs as non-root.
    - Least privilege. No service account gets more access than it needs.
      No egress rule is broader than necessary.
    - Never weaken existing security. Only tighten.
    - Flag first, fix second. Post findings to #ops before creating PRs
      for anything that might disrupt running services.

    ## What to Audit

    - **CiliumNetworkPolicies:** Default-deny + explicit allows per namespace.
      Minimize egress. Flag missing policies.
    - **RBAC:** Overly broad ClusterRoleBindings. Unused roles. ServiceAccounts
      with tokens mounted but never used.
    - **Pod Security Standards:** All namespaces should enforce `baseline`
      minimum. Flag anything running `privileged` without justification.
    - **Security contexts:** Drop ALL, allowPrivilegeEscalation=false,
      runAsNonRoot=true. Only add caps that are explicitly needed.
      (Exception: linuxserver.io images need SETUID+SETGID for s6 init.)
    - **Kyverno policies:** Cluster-wide policy enforcement for PSS, RBAC,
      and image validation. Check Kyverno policy reports for violations.
      Never disable or weaken Kyverno policies without Kyle's approval.
    - **TLS/Auth:** HTTPRoutes use HTTPS. Exposed services have Authentik SSO
      (currently: Grafana, ArgoCD via OIDC).

    ## Container Image Hygiene

    - Flag images older than 90 days — PR to bump or investigate.
    - Flag images without a pinned tag (using `latest` or floating tags).
    - Cross-reference running images against CVE databases:
      - **CVSS >= 9.0 (Critical):** Alert #ops immediately, PR to update.
      - **CVSS 7.0-8.9 (High):** Include in weekly audit, PR if fix available.
      - **CVSS < 7.0:** Note in audit, low priority.
    - Check that Renovate is tracking all image tags — if an image has
      no Renovate PR history, it's likely unmanaged.

    ## Schedule

    Weekly full audit → post summary to #ops, create PRs for findings.
    Monthly deep dive → capacity trends, deprecated K8s APIs, orphaned resources.

  dr-SKILL.md: |
    ---
    name: dr
    description: >-
      Disaster recovery. Verifies backups, tests restores, validates
      Vault health, and maintains awareness of blast radius.
    user-invocable: true
    ---

    # Disaster Recovery

    You don't just back things up — you verify they can be restored.

    ## Velero Backup Schedules

    | Schedule | When | Scope | Retention |
    |----------|------|-------|-----------|
    | daily-stateful | 03:00 UTC daily | arr, monitoring, auth | 7 days |
    | weekly-full-cluster | 04:00 UTC Sundays | all namespaces (except kube-system/public) | 30 days |

    Backend: MinIO in `backups` namespace (S3-compatible, 50Gi NFS).

    ## Regular Checks

    - Velero backups completing (last backup < 24h)
    - Velero backup schedules active (not suspended/errored)
    - Vault seal status and KMS connectivity
    - All ExternalSecrets syncing without errors
    - MinIO health and storage usage (backup target)
    - Authentik PostgreSQL/Redis health (auth DB failure = no SSO)

    ## Monthly Test Restores

    Pick a non-critical app (e.g., uptime-kuma). Restore its Velero
    backup to a temp namespace. Verify it works. Delete temp namespace.
    Report results to #ops.

    ## Blast Radius Awareness

    Know what breaks when dependencies fail:
    - **Vault down** → ExternalSecrets stop syncing → new pods can't get secrets
    - **NFS down** → All nfs-client PVCs become read-only or unavailable
    - **Cilium down** → All networking breaks (including Gateway API)
    - **ArgoCD down** → No new deployments (existing services keep running)
    - **cert-manager down** → TLS certs stop renewing (30 day buffer)
    - **Kyverno down** → Policy enforcement stops → new pods bypass PSS/RBAC checks
    - **Authentik down** → SSO fails for Grafana, ArgoCD (local auth still works)
    - **Intel GPU operator down** → Jellyfin falls back to CPU transcoding (slow)

    ## Node Failure

    1. Wait 5 min — might be a network blip
    2. If persistent, cordon the node
    3. Verify workloads rescheduled (Jellyfin needs GPU node)
    4. Alert Kyle in #ops

    ## Constraints

    - Never delete production backups
    - Test restores to temp namespaces only
    - Never restore over existing data

  media-SKILL.md: |
    ---
    name: media
    description: >-
      Streaming concierge. Full media pipeline from request to playback.
      Fulfills requests, monitors quality, keeps the library healthy.
    user-invocable: true
    metadata:
      openclaw:
        requires:
          env: [SONARR_API_KEY, RADARR_API_KEY, PROWLARR_API_KEY]
    ---

    # Streaming Concierge

    Media pipeline: requests → indexing → downloads → transcoding →
    subtitles → playback. See TOOLS.md for arr service URLs.
    See WEBHOOKS.md for real-time event handling.

    ## Fulfilling Requests

    When someone asks for a movie or show:
    1. Search Radarr (movies) or Sonarr (TV) for the title
    2. If found, add it with the best available quality profile
    3. Confirm in #media: what was added, expected quality, ETA
    4. Monitor the download — follow up if it stalls
    5. Once downloaded, verify it's playable in Jellyfin

    If a title isn't found, check Prowlarr for indexer health and
    try alternative search terms before reporting failure.

    ## Library Management

    - **Quality profiles** managed by Recyclarr (TRaSH Guides). If grabs
      look wrong, check Recyclarr sync status first.
    - **Subtitles** managed by Bazarr. Target: >90% coverage.
    - **Transcoding** managed by Tdarr. Jellyfin uses Intel GPU (i915) —
      if transcode performance drops, check GPU allocation.
    - **Extraction** managed by Unpackerr. If imports stall after
      download completes, check Unpackerr logs.
    - **Disk usage** — at 85% (NFSStorageLow alert threshold), suggest
      cleanup of orphaned transcodes and failed imports.

    ## Troubleshooting

    Diagnose in pipeline order — the failure is usually upstream:

    1. **Indexer down** → Prowlarr, then FlareSolverr.
    2. **Download stuck** → qBittorrent stalled torrents. Re-search if no seeds.
    3. **Extraction stuck** → Unpackerr logs. Restart if hung.
    4. **Import failed** → Sonarr/Radarr activity logs.
    5. **Transcode failing** → Tdarr logs. Corrupt source → re-download.
    6. **Missing from Jellyfin** → Library scan. Check NFS permissions.
    7. **Service unreachable** → Restart the pod.
