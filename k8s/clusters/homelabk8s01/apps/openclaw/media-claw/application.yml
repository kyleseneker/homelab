apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openclaw-media
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://bjw-s-labs.github.io/helm-charts
    chart: app-template
    targetRevision: 4.6.2
    helm:
      valuesObject:
        defaultPodOptions:
          annotations:
            reloader.stakater.com/auto: "true"
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault

        controllers:
          main:
            serviceAccount:
              identifier: openclaw-media
            initContainers:
              copy-boot:
                image:
                  repository: alpine
                  tag: "3.21"
                command: ["/bin/sh", "-c"]
                args:
                  - |
                    mkdir -p /state/workspace
                    cp /boot/BOOT.md /state/workspace/BOOT.md 2>/dev/null || true
                    for f in IDENTITY.md SOUL.md USER.md TOOLS.md HEARTBEAT.md WEBHOOKS.md; do
                      cp /workspace-src/$f /state/workspace/$f 2>/dev/null || true
                    done
                securityContext:
                  allowPrivilegeEscalation: false
                  capabilities:
                    drop:
                      - ALL
                resources:
                  requests:
                    cpu: 10m
                    memory: 16Mi
                  limits:
                    memory: 32Mi
            containers:
              main:
                image:
                  repository: ghcr.io/openclaw/openclaw
                  tag: "2026.3.7"
                env:
                  TZ: America/Chicago
                  OPENCLAW_CONFIG: /config/config.json5
                  # Internal pod-to-pod WS does not use TLS — safe within the cluster network
                  OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: "1"
                envFrom:
                  - secretRef:
                      name: openclaw-media-secrets
                securityContext:
                  allowPrivilegeEscalation: false
                  capabilities:
                    drop:
                      - ALL
                resources:
                  requests:
                    cpu: 100m
                    memory: 1Gi
                  limits:
                    memory: 2Gi
                probes:
                  liveness:
                    enabled: true
                    custom: true
                    spec:
                      exec:
                        command: ["curl", "-sf", "http://127.0.0.1:18789/healthz"]
                      periodSeconds: 30
                  readiness:
                    enabled: true
                    custom: true
                    spec:
                      exec:
                        command: ["curl", "-sf", "http://127.0.0.1:18789/healthz"]
                      periodSeconds: 10
                  startup:
                    enabled: true
                    custom: true
                    spec:
                      exec:
                        command: ["curl", "-sf", "http://127.0.0.1:18789/healthz"]
                      failureThreshold: 30
                      periodSeconds: 5

        serviceAccount:
          openclaw-media: {}

        service:
          main:
            controller: main
            ports:
              http:
                port: 18789

        route:
          main:
            enabled: true
            kind: HTTPRoute
            parentRefs:
              - group: gateway.networking.k8s.io
                kind: Gateway
                name: homelab-gateway
                namespace: default
                sectionName: https
            hostnames:
              - openclaw-media.homelab.local
            rules:
              - matches:
                  - path:
                      type: PathPrefix
                      value: /
                backendRefs:
                  - name: openclaw-media
                    port: 18789

        persistence:
          data:
            type: persistentVolumeClaim
            storageClass: nfs-client
            accessMode: ReadWriteOnce
            size: 2Gi
            advancedMounts:
              main:
                copy-boot:
                  - path: /state
                main:
                  - path: /home/node/.openclaw
          config:
            type: configMap
            name: openclaw-media-config
            globalMounts:
              - path: /config/config.json5
                subPath: config.json5
                readOnly: true
          skills:
            type: configMap
            name: openclaw-media-skills
            globalMounts:
              - path: /skills/media/SKILL.md
                subPath: media-SKILL.md
                readOnly: true
          workspace-src:
            type: configMap
            name: openclaw-media-workspace
            advancedMounts:
              main:
                copy-boot:
                  - path: /workspace-src
          boot:
            type: configMap
            name: openclaw-media-boot
            advancedMounts:
              main:
                copy-boot:
                  - path: /boot/BOOT.md
                    subPath: BOOT.md
                    readOnly: true

  destination:
    server: https://kubernetes.default.svc
    namespace: openclaw
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - ServerSideDiff=true
