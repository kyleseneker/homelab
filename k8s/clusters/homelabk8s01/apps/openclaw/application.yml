apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openclaw
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://bjw-s-labs.github.io/helm-charts
    chart: app-template
    targetRevision: 4.6.2
    helm:
      valuesObject:
        defaultPodOptions:
          annotations:
            reloader.stakater.com/auto: "true"
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault

        controllers:
          main:
            serviceAccount:
              identifier: openclaw
            initContainers:
              tooling:
                image:
                  repository: alpine
                  tag: "3.21"
                command: ["/bin/sh", "-c"]
                args:
                  - |
                    set -e
                    # Download kubectl — alpine has wget built in
                    wget -qO /tools/kubectl \
                      "https://dl.k8s.io/release/v1.31.4/bin/linux/amd64/kubectl"
                    chmod +x /tools/kubectl
                    # Download kubeconform
                    wget -qO- \
                      "https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz" \
                      | tar xz -C /tools kubeconform
                    # Copy workspace files into persistent state dir
                    mkdir -p /state/workspace
                    cp /boot/BOOT.md /state/workspace/BOOT.md 2>/dev/null || true
                    for f in IDENTITY.md SOUL.md USER.md TOOLS.md HEARTBEAT.md WEBHOOKS.md; do
                      cp /workspace-src/$f /state/workspace/$f 2>/dev/null || true
                    done
                securityContext:
                  allowPrivilegeEscalation: false
                  capabilities:
                    drop:
                      - ALL
                resources:
                  requests:
                    cpu: 100m
                    memory: 64Mi
                  limits:
                    memory: 128Mi
            containers:
              main:
                image:
                  repository: ghcr.io/openclaw/openclaw
                  tag: "2026.3.7"
                env:
                  TZ: America/Chicago
                  OPENCLAW_CONFIG: /config/config.json5
                  # Internal pod-to-pod WS does not use TLS — this is safe within the cluster network
                  OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: "1"
                  PATH: /usr/local/bin/tools:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
                envFrom:
                  - secretRef:
                      name: openclaw-secrets
                securityContext:
                  allowPrivilegeEscalation: false
                  readOnlyRootFilesystem: true
                  capabilities:
                    drop:
                      - ALL
                resources:
                  requests:
                    cpu: 200m
                    memory: 1Gi
                  limits:
                    memory: 2Gi
                probes:
                  liveness:
                    enabled: true
                    custom: true
                    spec:
                      exec:
                        command: ["curl", "-sf", "http://127.0.0.1:18789/healthz"]
                      periodSeconds: 30
                  readiness:
                    enabled: true
                    custom: true
                    spec:
                      exec:
                        command: ["curl", "-sf", "http://127.0.0.1:18789/healthz"]
                      periodSeconds: 10
                  startup:
                    enabled: true
                    custom: true
                    spec:
                      exec:
                        command: ["curl", "-sf", "http://127.0.0.1:18789/healthz"]
                      failureThreshold: 30
                      periodSeconds: 5

        serviceAccount:
          openclaw: {}

        service:
          main:
            controller: main
            ports:
              http:
                port: 18789

        route:
          main:
            enabled: true
            kind: HTTPRoute
            parentRefs:
              - group: gateway.networking.k8s.io
                kind: Gateway
                name: homelab-gateway
                namespace: default
                sectionName: https
            hostnames:
              - openclaw.homelab.local
            rules:
              - matches:
                  - path:
                      type: PathPrefix
                      value: /
                backendRefs:
                  - name: openclaw
                    port: 18789

        persistence:
          tmp:
            type: emptyDir
            globalMounts:
              - path: /tmp
          data:
            type: persistentVolumeClaim
            storageClass: nfs-client
            accessMode: ReadWriteOnce
            size: 2Gi
            advancedMounts:
              main:
                tooling:
                  - path: /state
                main:
                  - path: /home/node/.openclaw
          config:
            type: configMap
            name: openclaw-config
            globalMounts:
              - path: /config/config.json5
                subPath: config.json5
                readOnly: true
          skills:
            type: configMap
            name: openclaw-skills
            globalMounts:
              - path: /skills/ops/SKILL.md
                subPath: ops-SKILL.md
                readOnly: true
              - path: /skills/security/SKILL.md
                subPath: security-SKILL.md
                readOnly: true
              - path: /skills/dr/SKILL.md
                subPath: dr-SKILL.md
                readOnly: true
              - path: /skills/media/SKILL.md
                subPath: media-SKILL.md
                readOnly: true
          workspace-src:
            type: configMap
            name: openclaw-workspace
            advancedMounts:
              main:
                tooling:
                  - path: /workspace-src
          boot:
            type: configMap
            name: openclaw-boot
            advancedMounts:
              main:
                tooling:
                  - path: /boot/BOOT.md
                    subPath: BOOT.md
                    readOnly: true
          tools:
            type: emptyDir
            advancedMounts:
              main:
                tooling:
                  - path: /tools
                main:
                  - path: /usr/local/bin/tools
                    readOnly: true

  destination:
    server: https://kubernetes.default.svc
    namespace: openclaw
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - ServerSideDiff=true
