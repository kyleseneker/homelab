# Ops Claw — Slack, Anthropic, and GitHub for full operator capabilities
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openclaw-ops-secrets
  namespace: openclaw
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: openclaw-ops-secrets
  data:
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: apps/openclaw
        property: ANTHROPIC_API_KEY
    - secretKey: SLACK_APP_TOKEN
      remoteRef:
        key: apps/openclaw
        property: SLACK_APP_TOKEN
    - secretKey: SLACK_BOT_TOKEN
      remoteRef:
        key: apps/openclaw
        property: SLACK_BOT_TOKEN
    - secretKey: GITHUB_TOKEN
      remoteRef:
        key: apps/openclaw
        property: GITHUB_TOKEN
---
# Media Claw — Slack, Anthropic, and arr API keys only
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openclaw-media-secrets
  namespace: openclaw
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: openclaw-media-secrets
  data:
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: apps/openclaw-media
        property: ANTHROPIC_API_KEY
    - secretKey: SLACK_APP_TOKEN
      remoteRef:
        key: apps/openclaw-media
        property: SLACK_APP_TOKEN
    - secretKey: SLACK_BOT_TOKEN
      remoteRef:
        key: apps/openclaw-media
        property: SLACK_BOT_TOKEN
    - secretKey: SONARR_API_KEY
      remoteRef:
        key: apps/exportarr
        property: sonarr-api-key
    - secretKey: RADARR_API_KEY
      remoteRef:
        key: apps/exportarr
        property: radarr-api-key
    - secretKey: PROWLARR_API_KEY
      remoteRef:
        key: apps/exportarr
        property: prowlarr-api-key
