# Claw BOOT.md — runs automatically on gateway startup
apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-boot
  namespace: openclaw
data:
  BOOT.md: |
    # Startup

    ## Infrastructure check

    1. `kubectl get pods -A` — anything not Running/Completed?
    2. `kubectl top nodes` — resource pressure?
    3. Query Prometheus for firing alerts
    4. Verify Vault is unsealed
    5. Verify Alertmanager `openclaw` webhook receiver is active
    6. One-line summary to #ops

    ## Media check

    1. Health-check every arr service via their APIs
    2. Check companion services: Unpackerr, Recyclarr, FlareSolverr pods healthy?
    3. Register webhooks in Sonarr and Radarr (see below)
    4. Check download queue and Tdarr for stuck items
    5. One-line summary to #media

    ## Cron jobs

    Register with `openclaw cron add`. Verify they exist on every boot.

    **nightly-cleanup** — every day at 2:00 AM
    Clean up failed/evicted pods and completed jobs. Diagnose crashloops.

    **morning-briefing** — every day at 8:00 AM
    Node headroom, firing alerts, PVC usage. Post only if something needs attention.

    **weekly-audit** — every Saturday at 9:00 AM
    Full cluster audit: resources, ExternalSecrets, Velero, PVC usage,
    security posture. Self-audit your own skills and workspace ConfigMaps
    against actual cluster state — PR any drift. Post report to #ops.

    **media-health** — every 12 hours
    Health-check arr services. Restart downloads stalled >6 hours.

    **disk-check** — every day at 8:00 AM
    Media volume usage. Post to #media only if any >85%.

    **library-audit** — every Sunday at 10:00 AM
    Library stats, quality distribution, subtitle coverage, Tdarr queue,
    Recyclarr sync status, Unpackerr health. Post to #media.

    **whats-new** — every Friday at 6:00 PM
    What was added to the library this week. Friendly tone — this is
    for the household, not an incident report.

    ## Heartbeat config

    ```sh
    openclaw config set heartbeat.every "30m"
    openclaw config set heartbeat.lightContext true
    openclaw config set heartbeat.isolatedSession true
    openclaw config set heartbeat.ackMaxChars 200
    ```

    ## Webhook setup

    You receive Sonarr/Radarr events via HTTP webhooks. Two pieces
    must be in place:

    ### 1. Gateway hooks config (persisted on PVC)

    Verify hooks are enabled: `openclaw config get hooks.enabled`

    If not configured, set up:
    ```sh
    openclaw config set hooks.enabled true
    openclaw config set hooks.token "$OPENCLAW_HOOKS_TOKEN"
    openclaw config set hooks.path "/webhook"
    openclaw config set hooks.defaultSessionKey "hook:ingress"
    openclaw config set hooks.allowedAgentIds '["main"]'
    openclaw config set hooks.mappings '[{"match":{"path":"sonarr"},"action":"agent","agentId":"main","deliver":true,"transform":{"module":"arr-webhook.js"}},{"match":{"path":"radarr"},"action":"agent","agentId":"main","deliver":true,"transform":{"module":"arr-webhook.js"}}]'
    openclaw config set hooks.transformsDir "$HOME/.openclaw/hooks/transforms"
    ```

    The transform at `~/.openclaw/hooks/transforms/arr-webhook.js`
    converts raw arr payloads into agent messages. If it's missing,
    recreate it (ESM default export returning `{message: string}`).

    ### 2. Arr notification registration (idempotent)

    For each service (Sonarr, Radarr), ensure a "Claw" webhook
    notification exists via the `/api/v3/notification` endpoint:

    ```json
    {
      "name": "Claw",
      "implementation": "Webhook",
      "configContract": "WebhookSettings",
      "fields": [
        {"name": "url", "value": "http://openclaw.openclaw.svc.cluster.local:18789/webhook/<service>"},
        {"name": "method", "value": 1},
        {"name": "headers", "value": [{"key": "Authorization", "value": "Bearer <token>"}]}
      ],
      "onGrab": true,
      "onDownload": true,
      "onRename": false,
      "onSeriesDelete": true,
      "onEpisodeFileDelete": true,
      "onMovieDelete": true,
      "onMovieFileDelete": true,
      "onHealthIssue": true,
      "includeHealthWarnings": true
    }
    ```

    Replace `<service>` with `sonarr` or `radarr`. Replace `<token>`
    with `$OPENCLAW_HOOKS_TOKEN`. If registration fails, log the error
    and continue — the heartbeat covers monitoring until webhooks are fixed.
