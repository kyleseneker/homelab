apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: openclaw-ops
  namespace: openclaw
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: openclaw-ops
  endpoints:
    - port: http
      interval: 60s
      path: /metrics
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: openclaw-media
  namespace: openclaw
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: openclaw-media
  endpoints:
    - port: http
      interval: 60s
      path: /metrics
