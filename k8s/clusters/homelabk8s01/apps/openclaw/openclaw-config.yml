# Claw — Claude Sonnet 4.6 for complex reasoning
apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
  namespace: openclaw
data:
  config.json5: |
    {
      provider: "anthropic",
      model: "claude-sonnet-4-6",
      channels: {
        slack: {
          enabled: true,
          mode: "socket",
          dmPolicy: "open",
          allowFrom: ["*"],
        },
      },
      gateway: {
        bind: "lan",
        port: 18789,
        auth: {
          mode: "token",
        },
        controlUi: {
          allowedOrigins: ["https://openclaw.homelab.local"],
        },
      },
      hooks: {
        enabled: true,
        path: "/webhook",
        token: "${OPENCLAW_HOOKS_TOKEN}",
        defaultSessionKey: "hook:ingress",
        allowedAgentIds: ["main"],
        transformsDir: "~/.openclaw/hooks/transforms",
        mappings: [
          {
            match: { path: "sonarr" },
            action: "agent",
            agentId: "main",
            deliver: true,
            transform: { module: "arr-webhook.js" },
          },
          {
            match: { path: "radarr" },
            action: "agent",
            agentId: "main",
            deliver: true,
            transform: { module: "arr-webhook.js" },
          },
          {
            match: { path: "alertmanager" },
            action: "agent",
            agentId: "main",
            deliver: true,
            transform: { module: "alertmanager-webhook.js" },
          },
        ],
      },
      skills: {
        paths: ["/skills"],
      },
    }
