# Claw — Claude Sonnet 4.6 for complex reasoning
apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
  namespace: openclaw
data:
  config.json5: |
    {
      provider: "anthropic",
      model: "claude-sonnet-4-6",
      channels: {
        slack: {
          enabled: true,
          mode: "socket",
          dmPolicy: "open",
          allowFrom: ["*"],
        },
      },
      gateway: {
        bind: "lan",
        port: 18789,
        controlUi: {
          allowedOrigins: ["https://openclaw.homelab.local"],
        },
      },
      skills: {
        paths: ["/skills"],
      },
    }
