# Ops Claw — Claude Sonnet for complex reasoning
apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-ops-config
  namespace: openclaw
data:
  config.json5: |
    {
      provider: "anthropic",
      model: "claude-sonnet-4-20250514",
      channels: {
        slack: {
          enabled: true,
          mode: "socket",
        },
      },
      gateway: {
        bind: "0.0.0.0",
        port: 18789,
      },
      skills: {
        paths: ["/skills"],
      },
    }
---
# Media Claw — Claude Haiku for simple API interactions
apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-media-config
  namespace: openclaw
data:
  config.json5: |
    {
      provider: "anthropic",
      model: "claude-haiku-4-5-20251001",
      channels: {
        slack: {
          enabled: true,
          mode: "socket",
        },
      },
      gateway: {
        bind: "0.0.0.0",
        port: 18789,
      },
      skills: {
        paths: ["/skills"],
      },
    }
