defaultPodOptions:
  securityContext:
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    runAsNonRoot: true
controllers:
  main:
    containers:
      main:
        image:
          repository: louislam/uptime-kuma
          tag: 2.2.1
        env:
          TZ: America/Chicago
          UPTIME_KUMA_DB_TYPE: sqlite
          NODE_TLS_REJECT_UNAUTHORIZED: '0'
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
        resources:
          requests:
            cpu: 25m
            memory: 128Mi
          limits:
            cpu: 50m
            memory: 256Mi
        probes:
          liveness:
            enabled: true
          readiness:
            enabled: true
          startup:
            enabled: true
            spec:
              failureThreshold: 30
              periodSeconds: 5
service:
  main:
    controller: main
    ports:
      http:
        port: 3001
route:
  main:
    enabled: true
    kind: HTTPRoute
    parentRefs:
      - group: gateway.networking.k8s.io
        kind: Gateway
        name: homelab-gateway
        namespace: default
        sectionName: https
    hostnames:
      - status.homelab.local
    rules:
      - matches:
          - path:
              type: PathPrefix
              value: /
        backendRefs:
          - name: uptime-kuma
            port: 3001
persistence:
  tmp:
    type: emptyDir
    globalMounts:
      - path: /tmp
  data:
    type: persistentVolumeClaim
    existingClaim: uptime-kuma-data
    globalMounts:
      - path: /app/data
