controllers:
  main:
    containers:
      main:
        image:
          repository: lscr.io/linuxserver/radarr
          tag: 6.1.1
        envFrom:
          - configMapRef:
              name: arr-env
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
            add:
              - SETUID
              - SETGID
              - CHOWN
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /ping
                port: 7878
              periodSeconds: 30
              timeoutSeconds: 15
              failureThreshold: 10
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /ping
                port: 7878
              periodSeconds: 15
              timeoutSeconds: 15
              failureThreshold: 5
          startup:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /ping
                port: 7878
              periodSeconds: 5
              timeoutSeconds: 15
              failureThreshold: 30
service:
  main:
    controller: main
    ports:
      http:
        port: 7878
route:
  main:
    enabled: true
    kind: HTTPRoute
    parentRefs:
      - group: gateway.networking.k8s.io
        kind: Gateway
        name: homelab-gateway
        namespace: default
        sectionName: https
    hostnames:
      - radarr.homelab.local
    rules:
      - matches:
          - path:
              type: PathPrefix
              value: /
        backendRefs:
          - name: arr-radarr
            port: 7878
defaultPodOptions:
  annotations:
    backup.velero.io/backup-volumes-excludes: data
persistence:
  config:
    type: persistentVolumeClaim
    existingClaim: arr-radarr-config
    globalMounts:
      - path: /config
  data:
    type: persistentVolumeClaim
    existingClaim: arr-data
    globalMounts:
      - path: /data
