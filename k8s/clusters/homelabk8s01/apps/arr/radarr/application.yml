apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: arr-radarr
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://bjw-s-labs.github.io/helm-charts
    chart: app-template
    targetRevision: 4.6.2
    helm:
      valuesObject:
        controllers:
          main:
            containers:
              main:
                image:
                  repository: lscr.io/linuxserver/radarr
                  tag: 6.0.4
                envFrom:
                  - configMapRef:
                      name: arr-env
                securityContext:
                  allowPrivilegeEscalation: false
                  capabilities:
                    drop:
                      - ALL
                    add:
                      - SETUID
                      - SETGID
                resources:
                  requests:
                    cpu: 250m
                    memory: 512Mi
                  limits:
                    memory: 1Gi
                probes:
                  liveness:
                    enabled: true
                    custom: true
                    spec:
                      httpGet:
                        path: /ping
                        port: 7878
                      periodSeconds: 10
                      timeoutSeconds: 10
                      failureThreshold: 3
                  readiness:
                    enabled: true
                    custom: true
                    spec:
                      httpGet:
                        path: /ping
                        port: 7878
                      periodSeconds: 10
                      timeoutSeconds: 10
                      failureThreshold: 3
                  startup:
                    enabled: true
                    custom: true
                    spec:
                      httpGet:
                        path: /ping
                        port: 7878
                      periodSeconds: 5
                      timeoutSeconds: 5
                      failureThreshold: 30

        service:
          main:
            controller: main
            ports:
              http:
                port: 7878

        route:
          main:
            enabled: true
            kind: HTTPRoute
            parentRefs:
              - group: gateway.networking.k8s.io
                kind: Gateway
                name: homelab-gateway
                namespace: default
                sectionName: https
            hostnames:
              - radarr.homelab.local
            rules:
              - matches:
                  - path:
                      type: PathPrefix
                      value: /
                backendRefs:
                  - name: arr-radarr
                    port: 7878

        persistence:
          config:
            type: persistentVolumeClaim
            existingClaim: arr-radarr-config
            globalMounts:
              - path: /config
          data:
            type: persistentVolumeClaim
            existingClaim: arr-data
            globalMounts:
              - path: /data

  destination:
    server: https://kubernetes.default.svc
    namespace: arr
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - ServerSideDiff=true
