apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: arr-prowlarr
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://bjw-s-labs.github.io/helm-charts
    chart: app-template
    targetRevision: 4.6.2
    helm:
      valuesObject:
        controllers:
          main:
            containers:
              main:
                image:
                  repository: lscr.io/linuxserver/prowlarr
                  tag: 2.3.0
                envFrom:
                  - configMapRef:
                      name: arr-env
                resources:
                  requests:
                    cpu: 50m
                    memory: 128Mi
                  limits:
                    memory: 256Mi
                probes:
                  liveness:
                    enabled: true
                  readiness:
                    enabled: true
                  startup:
                    enabled: true

        service:
          main:
            controller: main
            ports:
              http:
                port: 9696

        route:
          main:
            enabled: true
            kind: HTTPRoute
            parentRefs:
              - group: gateway.networking.k8s.io
                kind: Gateway
                name: homelab-gateway
                namespace: default
                sectionName: https
            hostnames:
              - prowlarr.homelab.local
            rules:
              - matches:
                  - path:
                      type: PathPrefix
                      value: /
                backendRefs:
                  - name: arr-prowlarr
                    port: 9696

        persistence:
          config:
            type: persistentVolumeClaim
            existingClaim: arr-prowlarr-config
            globalMounts:
              - path: /config

  destination:
    server: https://kubernetes.default.svc
    namespace: arr
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - ServerSideDiff=true
