fullnameOverride: arr-seerr

extraEnvFrom:
  - configMapRef:
      name: arr-env

resources:
  requests:
    cpu: 50m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

config:
  persistence:
    existingClaim: arr-seerr-config

route:
  main:
    enabled: true
    parentRefs:
      - group: gateway.networking.k8s.io
        kind: Gateway
        name: homelab-gateway
        namespace: default
        sectionName: https
    hostnames:
      - seerr.homelab.local
