apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: arr-lidarr
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://bjw-s-labs.github.io/helm-charts
    chart: app-template
    targetRevision: 3.6.0
    helm:
      valuesObject:
        controllers:
          main:
            containers:
              main:
                image:
                  repository: lscr.io/linuxserver/lidarr
                  tag: latest
                envFrom:
                  - configMapRef:
                      name: arr-env
                probes:
                  liveness:
                    enabled: true
                  readiness:
                    enabled: true
                  startup:
                    enabled: true

        service:
          main:
            controller: main
            ports:
              http:
                port: 8686

        ingress:
          main:
            enabled: true
            className: nginx
            hosts:
              - host: lidarr.homelab.local
                paths:
                  - path: /
                    service:
                      identifier: main
                      port: http

        persistence:
          config:
            type: persistentVolumeClaim
            storageClass: nfs-client
            accessMode: ReadWriteOnce
            size: 1Gi
            globalMounts:
              - path: /config
          data:
            type: persistentVolumeClaim
            existingClaim: arr-data
            globalMounts:
              - path: /data

  destination:
    server: https://kubernetes.default.svc
    namespace: arr
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
