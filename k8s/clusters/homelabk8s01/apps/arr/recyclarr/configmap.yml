apiVersion: v1
kind: ConfigMap
metadata:
  name: recyclarr-config
  namespace: arr
data:
  recyclarr.yml: |
    sonarr:
      main:
        base_url: http://arr-sonarr.arr.svc.cluster.local:8989
        api_key: !secret sonarr_api_key  # Set after initial Sonarr setup
        quality_definition:
          type: series
        quality_profiles:
          - name: WEB-1080p
            reset_unmatched_scores:
              enabled: true
            upgrade:
              allowed: true
              until_quality: WEB 1080p
              until_score: 10000
        custom_formats:
          - trash_ids:
              - 32b367365729d530ca1c124a0b180c64  # Bad Dual Groups
              - 82d40da2bc6923f41e14394075dd4b03  # No-RlsGroup
              - e1a997ddb54e3ecbfe06341ad323c458  # Obfuscated
              - 06d66ab109d4d2eddb2794d21526d140  # Retags
            assign_scores_to:
              - name: WEB-1080p

    radarr:
      main:
        base_url: http://arr-radarr.arr.svc.cluster.local:7878
        api_key: !secret radarr_api_key  # Set after initial Radarr setup
        quality_definition:
          type: movie
        quality_profiles:
          - name: HD Bluray + WEB
            reset_unmatched_scores:
              enabled: true
            upgrade:
              allowed: true
              until_quality: Bluray-1080p
              until_score: 10000
        custom_formats:
          - trash_ids:
              - b6832f586342ef70d9c128d40c07b872  # Bad Dual Groups
              - 90cedc1fea7ea5d11298bebd3d1d3223  # EVO (no WEBDL)
              - ae9b7c9ebde1f3bd336a8cbd1ec4c5e5  # No-RlsGroup
              - 7357cf5161efbbbe8c835e3e5cb36701  # Obfuscated
              - 5c44f778a4b1536006072925161d02ad  # Retags
            assign_scores_to:
              - name: HD Bluray + WEB
