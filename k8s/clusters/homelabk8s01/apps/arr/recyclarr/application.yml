apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: arr-recyclarr
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://bjw-s-labs.github.io/helm-charts
    chart: app-template
    targetRevision: 3.7.3
    helm:
      valuesObject:
        controllers:
          main:
            type: cronjob
            cronjob:
              schedule: "0 */6 * * *"
              successfulJobsHistory: 1
              failedJobsHistory: 3
            containers:
              main:
                image:
                  repository: ghcr.io/recyclarr/recyclarr
                  tag: 8.5.0
                args:
                  - sync
                resources:
                  requests:
                    cpu: 50m
                    memory: 64Mi
                  limits:
                    memory: 128Mi
                envFrom:
                  - configMapRef:
                      name: arr-env

        persistence:
          config:
            type: configMap
            name: recyclarr-config
            globalMounts:
              - path: /config/recyclarr.yml
                subPath: recyclarr.yml
                readOnly: true
          secrets:
            type: secret
            name: recyclarr-secrets
            globalMounts:
              - path: /config/secrets.yml
                subPath: secrets.yml
                readOnly: true

  destination:
    server: https://kubernetes.default.svc
    namespace: arr
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - ServerSideDiff=true
