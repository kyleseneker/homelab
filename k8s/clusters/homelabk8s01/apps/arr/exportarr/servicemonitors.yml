apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: exportarr-sonarr
  namespace: arr
  labels:
    app.kubernetes.io/name: exportarr
    app.kubernetes.io/instance: sonarr
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: sonarr
      app.kubernetes.io/name: arr-exportarr
  endpoints:
    - port: metrics
      interval: 60s
      path: /metrics
---
