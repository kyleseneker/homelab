apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-sonarr
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  sonarr.json: |
    {
      "annotations": { "list": [] },
      "description": "Sonarr metrics via Exportarr",
      "editable": true,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "panels": [
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 6,
          "panels": [],
          "title": "Show Information",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "mappings": [],
              "thresholds": { "mode": "absolute", "steps": [{ "color": "rgb(255, 255, 255)", "value": null }] }
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 4, "x": 0, "y": 1 },
          "id": 16,
          "options": { "colorMode": "value", "graphMode": "none", "reduceOptions": { "calcs": ["mean"], "fields": "", "values": false }, "textMode": "auto" },
          "targets": [
            { "expr": "sonarr_queue_total OR on() vector(0)", "instant": true, "legendFormat": "Queued", "refId": "A" },
            { "expr": "sonarr_history_total", "instant": true, "legendFormat": "Completed", "refId": "B" }
          ],
          "title": "Downloads",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "mappings": [],
              "thresholds": { "mode": "absolute", "steps": [{ "color": "rgb(255, 255, 255)", "value": null }] }
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 4, "x": 4, "y": 1 },
          "id": 8,
          "options": { "colorMode": "value", "graphMode": "none", "reduceOptions": { "calcs": ["mean"], "fields": "", "values": false }, "textMode": "auto" },
          "targets": [
            { "expr": "sonarr_series_monitored_total", "legendFormat": "Monitored", "refId": "A" },
            { "expr": "sonarr_series_total", "legendFormat": "Total", "refId": "B" }
          ],
          "title": "Series",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "mappings": [],
              "thresholds": { "mode": "absolute", "steps": [{ "color": "rgb(255, 255, 255)", "value": null }] }
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 4, "x": 8, "y": 1 },
          "id": 15,
          "options": { "colorMode": "value", "graphMode": "none", "reduceOptions": { "calcs": ["mean"], "fields": "", "values": false }, "textMode": "auto" },
          "targets": [
            { "expr": "sonarr_season_monitored_total", "legendFormat": "Monitored", "refId": "A" },
            { "expr": "sonarr_season_total", "legendFormat": "Total", "refId": "B" }
          ],
          "title": "Seasons",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "mappings": [],
              "thresholds": { "mode": "absolute", "steps": [{ "color": "rgb(255, 255, 255)", "value": null }] }
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 4, "x": 12, "y": 1 },
          "id": 14,
          "options": { "colorMode": "value", "graphMode": "none", "reduceOptions": { "calcs": ["mean"], "fields": "", "values": false }, "textMode": "auto" },
          "targets": [
            { "expr": "sonarr_episode_downloaded_total", "legendFormat": "Downloaded", "refId": "A" },
            { "expr": "sonarr_episode_total", "legendFormat": "Total", "refId": "B" },
            { "expr": "sonarr_episode_missing_total", "legendFormat": "Missing", "refId": "C" }
          ],
          "title": "Episodes",
          "type": "stat"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 9 },
          "id": 12,
          "panels": [],
          "title": "Storage",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "mappings": [],
              "thresholds": { "mode": "absolute", "steps": [{ "color": "rgb(255, 255, 255)", "value": null }] },
              "unit": "decbytes"
            },
            "overrides": []
          },
          "gridPos": { "h": 5, "w": 6, "x": 0, "y": 10 },
          "id": 10,
          "options": { "colorMode": "value", "graphMode": "none", "reduceOptions": { "calcs": ["mean"], "fields": "", "values": false }, "textMode": "auto" },
          "targets": [
            { "expr": "sonarr_series_filesize_bytes", "legendFormat": "", "refId": "A" }
          ],
          "title": "Storage Used",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "mappings": [],
              "thresholds": { "mode": "absolute", "steps": [{ "color": "rgb(255, 255, 255)", "value": null }] },
              "unit": "decbytes"
            },
            "overrides": []
          },
          "gridPos": { "h": 5, "w": 6, "x": 6, "y": 10 },
          "id": 13,
          "options": { "colorMode": "value", "graphMode": "none", "reduceOptions": { "calcs": ["mean"], "fields": "", "values": false }, "textMode": "auto" },
          "targets": [
            { "expr": "sonarr_rootfolder_freespace_bytes", "legendFormat": "{{ path }}", "refId": "A" }
          ],
          "title": "Storage Available",
          "type": "stat"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": ["exportarr", "sonarr"],
      "templating": { "list": [] },
      "time": { "from": "now-6h", "to": "now" },
      "timezone": "",
      "title": "Sonarr",
      "uid": "exportarr-sonarr"
    }
---
