apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: unpackerr-secrets
  namespace: arr
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: unpackerr-secrets
  data:
    - secretKey: UN_SONARR_0_API_KEY
      remoteRef:
        key: apps/unpackerr
        property: UN_SONARR_0_API_KEY
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: UN_RADARR_0_API_KEY
      remoteRef:
        key: apps/unpackerr
        property: UN_RADARR_0_API_KEY
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: UN_QBIT_0_PASSWORD
      remoteRef:
        key: apps/unpackerr
        property: UN_QBIT_0_PASSWORD
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
