apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: arr-vpn-downloads
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://bjw-s-labs.github.io/helm-charts
    chart: app-template
    targetRevision: 4.6.2
    helm:
      valuesObject:
        controllers:
          main:
            containers:
              gluetun:
                image:
                  repository: qmcgaw/gluetun
                  tag: v3.41.1
                env:
                  VPN_SERVICE_PROVIDER: "private internet access"
                  SERVER_REGIONS: "US East"
                  FIREWALL_VPN_INPUT_PORTS: "6881"
                  FIREWALL_INPUT_PORTS: "8080,8085"
                  DOT: "off"
                envFrom:
                  - secretRef:
                      name: vpn-credentials
                resources:
                  requests:
                    cpu: 50m
                    memory: 128Mi
                  limits:
                    memory: 256Mi
                securityContext:
                  capabilities:
                    add:
                      - NET_ADMIN
                probes:
                  liveness:
                    enabled: true
                    custom: true
                    spec:
                      exec:
                        command:
                          - /gluetun-entrypoint
                          - healthcheck
                      initialDelaySeconds: 60
                      periodSeconds: 60
                      timeoutSeconds: 5
                      failureThreshold: 3
                  startup:
                    enabled: true
                    custom: true
                    spec:
                      exec:
                        command:
                          - /gluetun-entrypoint
                          - healthcheck
                      failureThreshold: 60
                      periodSeconds: 5

              qbittorrent:
                image:
                  repository: lscr.io/linuxserver/qbittorrent
                  tag: 5.1.4
                envFrom:
                  - configMapRef:
                      name: arr-env
                env:
                  WEBUI_PORT: "8080"
                resources:
                  requests:
                    cpu: 100m
                    memory: 256Mi
                  limits:
                    memory: 1Gi
                dependsOn: gluetun

              sabnzbd:
                image:
                  repository: lscr.io/linuxserver/sabnzbd
                  tag: 4.5.5
                envFrom:
                  - configMapRef:
                      name: arr-env
                resources:
                  requests:
                    cpu: 100m
                    memory: 256Mi
                  limits:
                    memory: 1Gi
                dependsOn: gluetun

        service:
          main:
            controller: main
            ports:
              qbit-http:
                port: 8080
              sabnzbd-http:
                port: 8085

        ingress:
          main:
            enabled: true
            className: nginx
            annotations:
              cert-manager.io/cluster-issuer: homelab-ca-issuer
              nginx.ingress.kubernetes.io/auth-url: "http://ak-outpost-authentik-embedded-outpost.auth.svc.cluster.local:9000/outpost.goauthentik.io/auth/nginx"
              nginx.ingress.kubernetes.io/auth-signin: "https://auth.homelab.local/outpost.goauthentik.io/start?rd=$scheme://$http_host$request_uri"
              nginx.ingress.kubernetes.io/auth-response-headers: "Set-Cookie,X-authentik-username,X-authentik-groups,X-authentik-email"
              nginx.ingress.kubernetes.io/auth-snippet: |
                proxy_set_header X-Forwarded-Host $http_host;
            hosts:
              - host: qbit.homelab.local
                paths:
                  - path: /
                    service:
                      identifier: main
                      port: qbit-http
              - host: sabnzbd.homelab.local
                paths:
                  - path: /
                    service:
                      identifier: main
                      port: sabnzbd-http
            tls:
              - hosts:
                  - qbit.homelab.local
                  - sabnzbd.homelab.local
                secretName: vpn-downloads-tls

        persistence:
          gluetun-config:
            type: persistentVolumeClaim
            storageClass: nfs-client
            accessMode: ReadWriteOnce
            size: 256Mi
            globalMounts:
              - path: /gluetun
          qbit-config:
            type: persistentVolumeClaim
            storageClass: nfs-client
            accessMode: ReadWriteOnce
            size: 1Gi
            advancedMounts:
              main:
                qbittorrent:
                  - path: /config
          sab-config:
            type: persistentVolumeClaim
            storageClass: nfs-client
            accessMode: ReadWriteOnce
            size: 1Gi
            advancedMounts:
              main:
                sabnzbd:
                  - path: /config
          data:
            type: persistentVolumeClaim
            existingClaim: arr-data
            globalMounts:
              - path: /data

        defaultPodOptions:
          securityContext:
            sysctls:
              - name: net.ipv4.conf.all.src_valid_mark
                value: "1"

  destination:
    server: https://kubernetes.default.svc
    namespace: arr
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - ServerSideDiff=true
