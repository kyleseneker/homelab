apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: arr-vpn-downloads
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://bjw-s.github.io/helm-charts
    chart: app-template
    targetRevision: 3.6.0
    helm:
      valuesObject:
        controllers:
          main:
            containers:
              gluetun:
                image:
                  repository: qmcgaw/gluetun
                  tag: latest
                env:
                  VPN_SERVICE_PROVIDER: private_internet_access
                  SERVER_REGIONS: "US East"
                  FIREWALL_VPN_INPUT_PORTS: "6881"
                envFrom:
                  - secretRef:
                      name: vpn-credentials
                securityContext:
                  capabilities:
                    add:
                      - NET_ADMIN
                probes:
                  liveness:
                    enabled: true
                    custom: true
                    spec:
                      httpGet:
                        path: /
                        port: 8888
                      initialDelaySeconds: 30
                      periodSeconds: 30
                  startup:
                    enabled: true
                    custom: true
                    spec:
                      httpGet:
                        path: /
                        port: 8888
                      failureThreshold: 30
                      periodSeconds: 10

              qbittorrent:
                image:
                  repository: lscr.io/linuxserver/qbittorrent
                  tag: latest
                envFrom:
                  - configMapRef:
                      name: arr-env
                env:
                  WEBUI_PORT: "8080"
                dependsOn: gluetun
                probes:
                  liveness:
                    enabled: true
                    custom: true
                    spec:
                      httpGet:
                        path: /
                        port: 8080
                      initialDelaySeconds: 30
                  readiness:
                    enabled: true
                    custom: true
                    spec:
                      httpGet:
                        path: /
                        port: 8080

              sabnzbd:
                image:
                  repository: lscr.io/linuxserver/sabnzbd
                  tag: latest
                envFrom:
                  - configMapRef:
                      name: arr-env
                dependsOn: gluetun
                probes:
                  liveness:
                    enabled: true
                    custom: true
                    spec:
                      httpGet:
                        path: /
                        port: 8085
                      initialDelaySeconds: 30
                  readiness:
                    enabled: true
                    custom: true
                    spec:
                      httpGet:
                        path: /
                        port: 8085

        service:
          main:
            controller: main
            ports:
              qbit-http:
                port: 8080
              sabnzbd-http:
                port: 8085

        ingress:
          main:
            enabled: true
            className: nginx
            hosts:
              - host: qbit.homelab.local
                paths:
                  - path: /
                    service:
                      identifier: main
                      port: qbit-http
              - host: sabnzbd.homelab.local
                paths:
                  - path: /
                    service:
                      identifier: main
                      port: sabnzbd-http

        persistence:
          gluetun-config:
            type: persistentVolumeClaim
            storageClass: nfs-client
            accessMode: ReadWriteOnce
            size: 256Mi
            globalMounts:
              - path: /gluetun
          qbit-config:
            type: persistentVolumeClaim
            storageClass: nfs-client
            accessMode: ReadWriteOnce
            size: 1Gi
            advancedMounts:
              main:
                qbittorrent:
                  - path: /config
          sab-config:
            type: persistentVolumeClaim
            storageClass: nfs-client
            accessMode: ReadWriteOnce
            size: 1Gi
            advancedMounts:
              main:
                sabnzbd:
                  - path: /config
          data:
            type: persistentVolumeClaim
            existingClaim: arr-data
            globalMounts:
              - path: /data

        defaultPodOptions:
          securityContext:
            sysctls:
              - name: net.ipv4.conf.all.src_valid_mark
                value: "1"

  destination:
    server: https://kubernetes.default.svc
    namespace: arr
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
