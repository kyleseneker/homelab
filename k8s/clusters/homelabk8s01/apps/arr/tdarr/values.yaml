controllers:
  main:
    containers:
      main:
        image:
          repository: ghcr.io/haveagitgat/tdarr
          tag: 2.66.01
        envFrom:
          - configMapRef:
              name: arr-env
        env:
          serverIP: 0.0.0.0
          serverPort: '8266'
          webUIPort: '8265'
          internalNode: 'true'
          inContainer: 'true'
          ffmpegVersion: '7'
          nodeName: InternalNode
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
            add:
              - SETUID
              - SETGID
              - CHOWN
              - DAC_OVERRIDE
              - FOWNER
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            memory: 4Gi
            gpu.intel.com/i915: 1
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /
                port: 8265
              initialDelaySeconds: 30
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /
                port: 8265
          startup:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /
                port: 8265
              failureThreshold: 30
              periodSeconds: 10
defaultPodOptions:
  nodeSelector:
    gpu: intel
service:
  main:
    controller: main
    ports:
      http:
        port: 8265
      server:
        port: 8266
route:
  main:
    enabled: true
    kind: HTTPRoute
    parentRefs:
      - group: gateway.networking.k8s.io
        kind: Gateway
        name: homelab-gateway
        namespace: default
        sectionName: https
    hostnames:
      - tdarr.homelab.local
    rules:
      - matches:
          - path:
              type: PathPrefix
              value: /
        backendRefs:
          - name: arr-tdarr
            port: 8265
persistence:
  config:
    type: persistentVolumeClaim
    existingClaim: arr-tdarr-config
    globalMounts:
      - path: /app/server
  temp:
    type: persistentVolumeClaim
    storageClass: nfs-client
    accessMode: ReadWriteOnce
    size: 100Gi
    globalMounts:
      - path: /temp
  media:
    type: persistentVolumeClaim
    existingClaim: arr-data
    globalMounts:
      - path: /data/media
        subPath: media
  dri:
    type: hostPath
    hostPath: /dev/dri
    globalMounts:
      - path: /dev/dri
