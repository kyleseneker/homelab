apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: arr-tdarr
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://bjw-s-labs.github.io/helm-charts
    chart: app-template
    targetRevision: 3.6.0
    helm:
      valuesObject:
        controllers:
          main:
            containers:
              main:
                image:
                  repository: ghcr.io/haveagitgat/tdarr
                  tag: 2.64.01
                envFrom:
                  - configMapRef:
                      name: arr-env
                env:
                  serverIP: "0.0.0.0"
                  serverPort: "8266"
                  webUIPort: "8265"
                  internalNode: "true"
                  inContainer: "true"
                  ffmpegVersion: "6"
                resources:
                  requests:
                    cpu: 200m
                    memory: 512Mi
                  limits:
                    memory: 4Gi
                    gpu.intel.com/i915: 1
                probes:
                  liveness:
                    enabled: true
                    custom: true
                    spec:
                      httpGet:
                        path: /
                        port: 8265
                      initialDelaySeconds: 30
                  readiness:
                    enabled: true
                    custom: true
                    spec:
                      httpGet:
                        path: /
                        port: 8265
                  startup:
                    enabled: true
                    custom: true
                    spec:
                      httpGet:
                        path: /
                        port: 8265
                      failureThreshold: 30
                      periodSeconds: 10

        defaultPodOptions:
          nodeSelector:
            gpu: intel

        service:
          main:
            controller: main
            ports:
              http:
                port: 8265
              server:
                port: 8266

        ingress:
          main:
            enabled: true
            className: nginx
            annotations:
              cert-manager.io/cluster-issuer: homelab-ca-issuer
              nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
              nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
              nginx.ingress.kubernetes.io/auth-url: "http://ak-outpost-authentik-embedded-outpost.auth.svc.cluster.local:9000/outpost.goauthentik.io/auth/nginx"
              nginx.ingress.kubernetes.io/auth-signin: "https://auth.homelab.local/outpost.goauthentik.io/start?rd=$scheme://$http_host$request_uri"
              nginx.ingress.kubernetes.io/auth-response-headers: "Set-Cookie,X-authentik-username,X-authentik-groups,X-authentik-email"
              nginx.ingress.kubernetes.io/auth-snippet: |
                proxy_set_header X-Forwarded-Host $http_host;
            hosts:
              - host: tdarr.homelab.local
                paths:
                  - path: /
                    service:
                      identifier: main
                      port: http
            tls:
              - hosts:
                  - tdarr.homelab.local
                secretName: tdarr-tls

        persistence:
          config:
            type: persistentVolumeClaim
            storageClass: nfs-client
            accessMode: ReadWriteOnce
            size: 1Gi
            globalMounts:
              - path: /app/server
          temp:
            type: emptyDir
            sizeLimit: 20Gi
            globalMounts:
              - path: /temp
          media:
            type: persistentVolumeClaim
            existingClaim: arr-data
            globalMounts:
              - path: /data/media
                subPath: media
          dri:
            type: hostPath
            hostPath: /dev/dri
            globalMounts:
              - path: /dev/dri

  destination:
    server: https://kubernetes.default.svc
    namespace: arr
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - ServerSideDiff=true
