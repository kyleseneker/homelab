apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: intel-gpu-operator
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://intel.github.io/helm-charts
    chart: intel-device-plugins-operator
    targetRevision: 0.31.1
    helm:
      valuesObject:
        resources:
          limits:
            cpu: 200m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 256Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: intel-gpu-operator
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true
    retry:
      limit: 30
      backoff:
        duration: 10s
        maxDuration: 5m
        factor: 2
