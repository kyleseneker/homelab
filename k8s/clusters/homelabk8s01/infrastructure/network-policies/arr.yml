apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: arr-default-deny
  namespace: arr
spec:
  endpointSelector: {}
  ingressDeny:
    - fromEntities:
        - world
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: arr-allow-gateway
  namespace: arr
spec:
  endpointSelector: {}
  ingress:
    - fromEntities:
        - ingress
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: arr-allow-internal
  namespace: arr
spec:
  endpointSelector: {}
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: arr
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: arr-allow-monitoring
  namespace: arr
spec:
  endpointSelector: {}
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: monitoring
---
# Egress policies
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: arr-default-deny-egress
  namespace: arr
spec:
  description: "Deny egress to external networks by default"
  endpointSelector: {}
  egressDeny:
    - toEntities:
        - world
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: arr-allow-egress-dns
  namespace: arr
spec:
  description: "Allow DNS resolution via kube-dns"
  endpointSelector: {}
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: arr-allow-egress-internal
  namespace: arr
spec:
  description: "Allow egress within the arr namespace (inter-app communication)"
  endpointSelector: {}
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: arr
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: arr-allow-egress-https
  namespace: arr
spec:
  description: "Allow arr apps to reach external APIs over HTTPS (indexers, metadata, etc.)"
  endpointSelector: {}
  egress:
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: arr-allow-egress-vpn
  namespace: arr
spec:
  description: "Allow Gluetun VPN sidecar to establish VPN tunnels to the internet"
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: arr-vpn-downloads
  egress:
    - toEntities:
        - world
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: arr-allow-egress-nfs
  namespace: arr
spec:
  description: "Allow egress to NFS server for persistent storage and media"
  endpointSelector: {}
  egress:
    - toCIDR:
        - 192.168.1.158/32
      toPorts:
        - ports:
            - port: "2049"
              protocol: TCP
