apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: arr-default-deny
  namespace: arr
spec:
  endpointSelector: {}
  ingressDeny:
    - fromEntities:
        - world
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: arr-allow-ingress-nginx
  namespace: arr
spec:
  endpointSelector: {}
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: ingress-nginx
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: arr-allow-internal
  namespace: arr
spec:
  endpointSelector: {}
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: arr
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: arr-allow-monitoring
  namespace: arr
spec:
  endpointSelector: {}
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: monitoring
