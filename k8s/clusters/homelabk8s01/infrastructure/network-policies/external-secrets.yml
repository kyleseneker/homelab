# Ingress policies
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: external-secrets-default-deny
  namespace: external-secrets
spec:
  description: "Deny ingress from outside the cluster"
  endpointSelector: {}
  ingressDeny:
    - fromEntities:
        - world
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: external-secrets-allow-ingress
  namespace: external-secrets
spec:
  description: "Allow ingress from cluster, API server, and host (for webhook calls)"
  endpointSelector: {}
  ingress:
    - fromEntities:
        - cluster
        - kube-apiserver
        - host
---
# Egress: implicit deny model
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: external-secrets-egress
  namespace: external-secrets
spec:
  description: "Default egress rules for all external-secrets pods"
  endpointSelector: {}
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: external-secrets
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: vault
      toPorts:
        - ports:
            - port: "8200"
              protocol: TCP
    - toEntities:
        - kube-apiserver
