# Ingress policies
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: external-secrets-default-deny
  namespace: external-secrets
spec:
  description: "Deny ingress from outside the cluster"
  endpointSelector: {}
  ingressDeny:
    - fromEntities:
        - world
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: external-secrets-allow-ingress
  namespace: external-secrets
spec:
  description: "Allow ingress from cluster, API server, and host (for webhook calls)"
  endpointSelector: {}
  ingress:
    - fromEntities:
        - cluster
        - kube-apiserver
        - host
---
# Egress policies
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: external-secrets-default-deny-egress
  namespace: external-secrets
spec:
  description: "Deny egress to external networks by default"
  endpointSelector: {}
  egressDeny:
    - toEntities:
        - world
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: external-secrets-allow-egress-dns
  namespace: external-secrets
spec:
  description: "Allow DNS resolution via kube-dns"
  endpointSelector: {}
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: external-secrets-allow-egress-internal
  namespace: external-secrets
spec:
  description: "Allow egress within the external-secrets namespace"
  endpointSelector: {}
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: external-secrets
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: external-secrets-allow-egress-vault
  namespace: external-secrets
spec:
  description: "Allow ESO to reach Vault API for secret syncing"
  endpointSelector: {}
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: vault
      toPorts:
        - ports:
            - port: "8200"
              protocol: TCP
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: external-secrets-allow-egress-kube-api
  namespace: external-secrets
spec:
  description: "Allow ESO to reach Kubernetes API to manage secrets in all namespaces"
  endpointSelector: {}
  egress:
    - toEntities:
        - kube-apiserver
