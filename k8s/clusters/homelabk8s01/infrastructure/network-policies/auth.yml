apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: auth-default-deny
  namespace: auth
spec:
  endpointSelector: {}
  ingressDeny:
    - fromEntities:
        - world
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: auth-allow-gateway
  namespace: auth
spec:
  endpointSelector: {}
  ingress:
    - fromEntities:
        - ingress
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: auth-allow-internal
  namespace: auth
spec:
  endpointSelector: {}
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: auth
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: auth-allow-monitoring
  namespace: auth
spec:
  endpointSelector: {}
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: monitoring
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: auth-allow-cluster
  namespace: auth
spec:
  description: "Allow cluster traffic to Authentik (OIDC from Grafana, etc.)"
  endpointSelector: {}
  ingress:
    - fromEntities:
        - cluster
---
# Egress: implicit deny model
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: auth-egress
  namespace: auth
spec:
  description: "Default egress rules for all auth pods"
  endpointSelector: {}
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: auth
    - toCIDR:
        - 192.168.1.158/32
      toPorts:
        - ports:
            - port: "2049"
              protocol: TCP
