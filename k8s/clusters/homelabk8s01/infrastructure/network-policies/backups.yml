apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: backups-default-deny
  namespace: backups
spec:
  endpointSelector: {}
  ingressDeny:
    - fromEntities:
        - world
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: backups-allow-internal
  namespace: backups
spec:
  endpointSelector: {}
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: backups
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: backups-allow-monitoring
  namespace: backups
spec:
  endpointSelector: {}
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: monitoring
---
# Egress: implicit deny model
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: backups-egress
  namespace: backups
spec:
  description: "Default egress rules for all backups pods"
  endpointSelector: {}
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: backups
    - toEntities:
        - kube-apiserver
    - toCIDR:
        - 192.168.1.158/32
      toPorts:
        - ports:
            - port: "2049"
              protocol: TCP
