apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: monitoring-default-deny
  namespace: monitoring
spec:
  endpointSelector: {}
  ingressDeny:
    - fromEntities:
        - world
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: monitoring-allow-gateway
  namespace: monitoring
spec:
  endpointSelector: {}
  ingress:
    - fromEntities:
        - ingress
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: monitoring-allow-internal
  namespace: monitoring
spec:
  endpointSelector: {}
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: monitoring
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: monitoring-allow-cluster-scraping
  namespace: monitoring
spec:
  description: "Allow cluster-internal traffic to Prometheus (Grafana queries, federation, etc.)"
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  ingress:
    - fromEntities:
        - cluster
---
# Egress: implicit deny model
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: monitoring-egress
  namespace: monitoring
spec:
  description: "Default egress rules for all monitoring pods"
  endpointSelector: {}
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: monitoring
    - toEntities:
        - kube-apiserver
    - toCIDR:
        - 192.168.1.158/32
      toPorts:
        - ports:
            - port: "2049"
              protocol: TCP
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: monitoring-egress-prometheus
  namespace: monitoring
spec:
  description: "Allow Prometheus to scrape metrics from all cluster endpoints"
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  egress:
    - toEntities:
        - cluster
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: monitoring-egress-grafana
  namespace: monitoring
spec:
  description: "Allow Grafana to reach Authentik for OIDC authentication"
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: grafana
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: auth
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: monitoring-egress-alertmanager
  namespace: monitoring
spec:
  description: "Allow Alertmanager to send notifications to Slack and OpenClaw"
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: alertmanager
  egress:
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: openclaw
      toPorts:
        - ports:
            - port: "18789"
              protocol: TCP
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: monitoring-egress-nut-exporter
  namespace: monitoring
spec:
  description: "Allow NUT exporter to reach upsd on the Proxmox host"
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: nut-exporter
  egress:
    - toCIDR:
        - 192.168.10.2/32
      toPorts:
        - ports:
            - port: "3493"
              protocol: TCP
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: monitoring-egress-uptime-kuma
  namespace: monitoring
spec:
  description: "Allow Uptime Kuma to health-check services across the cluster"
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: uptime-kuma
  egress:
    - toEntities:
        - cluster
