apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authentik-credentials
  namespace: auth
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: authentik-credentials
  data:
    - secretKey: AUTHENTIK_BOOTSTRAP_PASSWORD
      remoteRef:
        key: infrastructure/authentik
        property: AUTHENTIK_BOOTSTRAP_PASSWORD
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: AUTHENTIK_BOOTSTRAP_TOKEN
      remoteRef:
        key: infrastructure/authentik
        property: AUTHENTIK_BOOTSTRAP_TOKEN
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: AUTHENTIK_POSTGRESQL__PASSWORD
      remoteRef:
        key: infrastructure/authentik
        property: AUTHENTIK_POSTGRESQL__PASSWORD
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: AUTHENTIK_SECRET_KEY
      remoteRef:
        key: infrastructure/authentik
        property: AUTHENTIK_SECRET_KEY
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: postgresql-password
      remoteRef:
        key: infrastructure/authentik
        property: postgresql-password
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
