apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-oidc
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: argocd-secret
    creationPolicy: Merge
  data:
    - secretKey: oidc.authentik.clientSecret
      remoteRef:
        key: infrastructure/argocd-oidc
        property: oidc.authentik.clientSecret
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
