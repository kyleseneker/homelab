apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: velero-offsite-credentials
  namespace: backups
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: velero-offsite-credentials
  data:
    - secretKey: cloud
      remoteRef:
        key: infrastructure/velero-offsite
        property: cloud
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
