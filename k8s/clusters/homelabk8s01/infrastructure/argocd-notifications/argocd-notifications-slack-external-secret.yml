apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-notifications-slack
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: argocd-notifications-secret
    creationPolicy: Merge
  data:
    - secretKey: slack-token
      remoteRef:
        key: infrastructure/argocd-notifications-slack
        property: token
