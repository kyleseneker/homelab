apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: descheduler
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://kubernetes-sigs.github.io/descheduler/
    chart: descheduler
    targetRevision: 0.35.1
    helm:
      valuesObject:
        schedule: "*/30 * * * *"
        deschedulerPolicy:
          profiles:
            - name: default
              pluginConfig:
                - name: RemoveDuplicates
                  args:
                    excludeOwnerKinds:
                      - DaemonSet
                - name: LowNodeUtilization
                  args:
                    thresholds:
                      cpu: 20
                      memory: 20
                      pods: 20
                    targetThresholds:
                      cpu: 50
                      memory: 50
                      pods: 50
                - name: RemovePodsHavingTooManyRestarts
                  args:
                    podRestartThreshold: 10
                    includingInitContainers: true
              plugins:
                balance:
                  enabled:
                    - RemoveDuplicates
                    - LowNodeUtilization
                deschedule:
                  enabled:
                    - RemovePodsHavingTooManyRestarts
        resources:
          requests:
            cpu: 25m
            memory: 64Mi
          limits:
            memory: 128Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
