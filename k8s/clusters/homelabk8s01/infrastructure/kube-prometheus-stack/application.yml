apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 82.13.6
    helm:
      valuesObject:
        crds:
          enabled: true

        prometheus:
          ingress:
            enabled: true
            ingressClassName: nginx
            annotations:
              cert-manager.io/cluster-issuer: homelab-ca-issuer
            hosts:
              - prometheus.homelab.local
            tls:
              - hosts:
                  - prometheus.homelab.local
                secretName: prometheus-tls
          prometheusSpec:
            retention: 15d
            resources:
              requests:
                cpu: 200m
                memory: 512Mi
              limits:
                memory: 2Gi
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: nfs-client
                  accessModes:
                    - ReadWriteOnce
                  resources:
                    requests:
                      storage: 20Gi
            serviceMonitorSelectorNilUsesHelmValues: false
            podMonitorSelectorNilUsesHelmValues: false
            ruleSelectorNilUsesHelmValues: false

        grafana:
          podDisruptionBudget:
            enabled: true
            maxUnavailable: 1
          admin:
            existingSecret: grafana-admin
            userKey: admin-user
            passwordKey: admin-password
          envFromSecret: grafana-oidc-secret
          grafana.ini:
            server:
              root_url: https://grafana.homelab.local
            auth.generic_oauth:
              enabled: true
              name: Authentik
              client_id: grafana
              client_secret: ${GRAFANA_OIDC_CLIENT_SECRET}
              scopes: openid email profile
              auth_url: https://auth.homelab.local/application/o/authorize/
              token_url: http://authentik-server.auth.svc.cluster.local/application/o/token/
              api_url: http://authentik-server.auth.svc.cluster.local/application/o/userinfo/
              role_attribute_path: "contains(groups, 'authentik Admins') && 'Admin' || 'Viewer'"
          initChownData:
            enabled: false
          securityContext:
            runAsUser: 472
            runAsGroup: 472
            fsGroup: 472
          persistence:
            enabled: true
            storageClassName: nfs-client
            size: 2Gi
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 512Mi
          additionalDataSources:
            - name: Loki
              type: loki
              url: http://loki.monitoring.svc.cluster.local:3100
              access: proxy
              isDefault: false
          ingress:
            enabled: true
            ingressClassName: nginx
            annotations:
              cert-manager.io/cluster-issuer: homelab-ca-issuer
            hosts:
              - grafana.homelab.local
            tls:
              - hosts:
                  - grafana.homelab.local
                secretName: grafana-tls

        alertmanager:
          ingress:
            enabled: true
            ingressClassName: nginx
            annotations:
              cert-manager.io/cluster-issuer: homelab-ca-issuer
            hosts:
              - alertmanager.homelab.local
            tls:
              - hosts:
                  - alertmanager.homelab.local
                secretName: alertmanager-tls
          alertmanagerSpec:
            secrets:
              - alertmanager-slack-webhook
            resources:
              requests:
                cpu: 25m
                memory: 32Mi
              limits:
                memory: 128Mi
          config:
            global:
              resolve_timeout: 5m
            route:
              receiver: slack-alerts
              group_by:
                - alertname
                - namespace
              group_wait: 30s
              group_interval: 5m
              repeat_interval: 4h
              routes:
                - receiver: "null"
                  matchers:
                    - alertname = "Watchdog"
                - receiver: slack-alerts
                  matchers:
                    - severity =~ "warning|critical"
            inhibit_rules:
              - source_matchers:
                  - severity = "critical"
                target_matchers:
                  - severity = "warning"
                equal:
                  - alertname
                  - namespace
            receivers:
              - name: "null"
              - name: slack-alerts
                slack_configs:
                  - api_url_file: /etc/alertmanager/secrets/alertmanager-slack-webhook/url
                    channel: '#alerts'
                    send_resolved: true
                    title: '[{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .CommonLabels.alertname }}'
                    text: |-
                      {{ range .Alerts }}
                      *Alert:* {{ .Labels.alertname }} - `{{ .Labels.severity }}`
                      *Namespace:* {{ .Labels.namespace | default "cluster-wide" }}
                      *Description:* {{ .Annotations.description | default .Annotations.summary | default "No description" }}
                      {{ if .Labels.node }}*Node:* {{ .Labels.node }}{{ end }}
                      {{ end }}
                    color: '{{ if eq .Status "firing" }}{{ if eq .CommonLabels.severity "critical" }}danger{{ else }}warning{{ end }}{{ else }}good{{ end }}'

        nodeExporter:
          enabled: true
        prometheus-node-exporter:
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              memory: 64Mi

        kubeProxy:
          enabled: false

        kubeEtcd:
          enabled: false

        kubeControllerManager:
          enabled: false

        kubeScheduler:
          enabled: false

        prometheusOperator:
          podDisruptionBudget:
            enabled: true
            minAvailable: null
            maxUnavailable: 1

        kubeStateMetrics:
          enabled: true
        kube-state-metrics:
          podDisruptionBudget:
            maxUnavailable: 1
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - ServerSideDiff=true
