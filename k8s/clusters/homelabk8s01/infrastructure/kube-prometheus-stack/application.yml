apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 82.10.5
    helm:
      valuesObject:
        crds:
          enabled: true

        prometheus:
          ingress:
            enabled: true
            ingressClassName: nginx
            annotations:
              cert-manager.io/cluster-issuer: homelab-ca-issuer
            hosts:
              - prometheus.homelab.local
            tls:
              - hosts:
                  - prometheus.homelab.local
                secretName: prometheus-tls
          prometheusSpec:
            retention: 15d
            resources:
              requests:
                cpu: 200m
                memory: 512Mi
              limits:
                memory: 2Gi
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: nfs-client
                  accessModes:
                    - ReadWriteOnce
                  resources:
                    requests:
                      storage: 20Gi
            serviceMonitorSelectorNilUsesHelmValues: false
            podMonitorSelectorNilUsesHelmValues: false

        grafana:
          admin:
            existingSecret: grafana-admin
            userKey: admin-user
            passwordKey: admin-password
          initChownData:
            enabled: false
          securityContext:
            runAsUser: 472
            runAsGroup: 472
            fsGroup: 472
          persistence:
            enabled: true
            storageClassName: nfs-client
            size: 2Gi
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 512Mi
          additionalDataSources:
            - name: Loki
              type: loki
              url: http://loki.monitoring.svc.cluster.local:3100
              access: proxy
              isDefault: false
          ingress:
            enabled: true
            ingressClassName: nginx
            annotations:
              cert-manager.io/cluster-issuer: homelab-ca-issuer
            hosts:
              - grafana.homelab.local
            tls:
              - hosts:
                  - grafana.homelab.local
                secretName: grafana-tls

        alertmanager:
          ingress:
            enabled: true
            ingressClassName: nginx
            annotations:
              cert-manager.io/cluster-issuer: homelab-ca-issuer
            hosts:
              - alertmanager.homelab.local
            tls:
              - hosts:
                  - alertmanager.homelab.local
                secretName: alertmanager-tls
          alertmanagerSpec:
            resources:
              requests:
                cpu: 25m
                memory: 32Mi
              limits:
                memory: 128Mi

        nodeExporter:
          enabled: true
        prometheus-node-exporter:
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              memory: 64Mi

        kubeProxy:
          enabled: false

        kubeEtcd:
          enabled: false

        kubeControllerManager:
          enabled: false

        kubeScheduler:
          enabled: false

        kubeStateMetrics:
          enabled: true
        kube-state-metrics:
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
