apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-namespace-resources
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  namespace-resources.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "title": "CPU Requests by Namespace",
          "type": "table",
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "custom": { "filterable": true }
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Requested" },
                "properties": [{ "id": "unit", "value": "short" }]
              },
              {
                "matcher": { "id": "byName", "options": "Limits" },
                "properties": [{ "id": "unit", "value": "short" }]
              },
              {
                "matcher": { "id": "byName", "options": "Used" },
                "properties": [{ "id": "unit", "value": "short" }]
              },
              {
                "matcher": { "id": "byName", "options": "Request Efficiency" },
                "properties": [
                  { "id": "unit", "value": "percentunit" },
                  {
                    "id": "thresholds",
                    "value": {
                      "steps": [
                        { "color": "red", "value": null },
                        { "color": "yellow", "value": 0.2 },
                        { "color": "green", "value": 0.5 }
                      ]
                    }
                  },
                  { "id": "custom.displayMode", "value": "color-background" }
                ]
              }
            ]
          },
          "transformations": [
            {
              "id": "merge",
              "options": {}
            },
            {
              "id": "organize",
              "options": {
                "renameByName": {
                  "namespace": "Namespace",
                  "Value #Requested": "Requested",
                  "Value #Limits": "Limits",
                  "Value #Used": "Used",
                  "Value #Efficiency": "Request Efficiency"
                },
                "excludeByName": { "Time": true }
              }
            }
          ],
          "targets": [
            {
              "expr": "sum by (namespace) (kube_pod_container_resource_requests{resource=\"cpu\"})",
              "legendFormat": "{{ namespace }}",
              "format": "table",
              "instant": true,
              "refId": "Requested"
            },
            {
              "expr": "sum by (namespace) (kube_pod_container_resource_limits{resource=\"cpu\"})",
              "legendFormat": "{{ namespace }}",
              "format": "table",
              "instant": true,
              "refId": "Limits"
            },
            {
              "expr": "sum by (namespace) (rate(container_cpu_usage_seconds_total{container!=\"\"}[5m]))",
              "legendFormat": "{{ namespace }}",
              "format": "table",
              "instant": true,
              "refId": "Used"
            },
            {
              "expr": "sum by (namespace) (rate(container_cpu_usage_seconds_total{container!=\"\"}[5m])) / sum by (namespace) (kube_pod_container_resource_requests{resource=\"cpu\"})",
              "legendFormat": "{{ namespace }}",
              "format": "table",
              "instant": true,
              "refId": "Efficiency"
            }
          ]
        },
        {
          "title": "Memory Requests by Namespace",
          "type": "table",
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 10 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "custom": { "filterable": true }
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Requested" },
                "properties": [{ "id": "unit", "value": "bytes" }]
              },
              {
                "matcher": { "id": "byName", "options": "Limits" },
                "properties": [{ "id": "unit", "value": "bytes" }]
              },
              {
                "matcher": { "id": "byName", "options": "Used" },
                "properties": [{ "id": "unit", "value": "bytes" }]
              },
              {
                "matcher": { "id": "byName", "options": "Request Efficiency" },
                "properties": [
                  { "id": "unit", "value": "percentunit" },
                  {
                    "id": "thresholds",
                    "value": {
                      "steps": [
                        { "color": "red", "value": null },
                        { "color": "yellow", "value": 0.2 },
                        { "color": "green", "value": 0.5 }
                      ]
                    }
                  },
                  { "id": "custom.displayMode", "value": "color-background" }
                ]
              }
            ]
          },
          "transformations": [
            {
              "id": "merge",
              "options": {}
            },
            {
              "id": "organize",
              "options": {
                "renameByName": {
                  "namespace": "Namespace",
                  "Value #Requested": "Requested",
                  "Value #Limits": "Limits",
                  "Value #Used": "Used",
                  "Value #Efficiency": "Request Efficiency"
                },
                "excludeByName": { "Time": true }
              }
            }
          ],
          "targets": [
            {
              "expr": "sum by (namespace) (kube_pod_container_resource_requests{resource=\"memory\"})",
              "format": "table",
              "instant": true,
              "refId": "Requested"
            },
            {
              "expr": "sum by (namespace) (kube_pod_container_resource_limits{resource=\"memory\"})",
              "format": "table",
              "instant": true,
              "refId": "Limits"
            },
            {
              "expr": "sum by (namespace) (container_memory_working_set_bytes{container!=\"\"})",
              "format": "table",
              "instant": true,
              "refId": "Used"
            },
            {
              "expr": "sum by (namespace) (container_memory_working_set_bytes{container!=\"\"}) / sum by (namespace) (kube_pod_container_resource_requests{resource=\"memory\"})",
              "format": "table",
              "instant": true,
              "refId": "Efficiency"
            }
          ]
        },
        {
          "title": "Memory Usage by Namespace (over time)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 20 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "custom": {
                "fillOpacity": 20,
                "stacking": { "mode": "normal" },
                "lineWidth": 1
              }
            }
          },
          "targets": [
            {
              "expr": "sum by (namespace) (container_memory_working_set_bytes{container!=\"\"})",
              "legendFormat": "{{ namespace }}"
            }
          ]
        },
        {
          "title": "CPU Usage by Namespace (over time)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 28 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": {
                "fillOpacity": 20,
                "stacking": { "mode": "normal" },
                "lineWidth": 1
              }
            }
          },
          "targets": [
            {
              "expr": "sum by (namespace) (rate(container_cpu_usage_seconds_total{container!=\"\"}[5m]))",
              "legendFormat": "{{ namespace }}"
            }
          ]
        }
      ],
      "schemaVersion": 39,
      "tags": ["capacity", "homelab", "namespace"],
      "templating": { "list": [] },
      "time": { "from": "now-24h", "to": "now" },
      "title": "Namespace Resource Breakdown",
      "uid": "homelab-namespace-resources"
    }
