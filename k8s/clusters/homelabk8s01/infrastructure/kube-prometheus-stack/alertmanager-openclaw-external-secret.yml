apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: alertmanager-openclaw-hooks-token
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: alertmanager-openclaw-hooks-token
  data:
    - secretKey: token
      remoteRef:
        key: apps/openclaw
        property: OPENCLAW_HOOKS_TOKEN
