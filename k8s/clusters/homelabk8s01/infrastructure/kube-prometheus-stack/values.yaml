crds:
  enabled: true
prometheus:
  prometheusSpec:
    retention: 15d
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        memory: 2Gi
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: nfs-client
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 20Gi
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
grafana:
  podDisruptionBudget:
    enabled: true
    maxUnavailable: 1
  admin:
    existingSecret: grafana-admin
    userKey: admin-user
    passwordKey: admin-password
  envFromSecret: grafana-oidc-secret
  grafana.ini:
    server:
      root_url: https://grafana.homelab.local
    auth.generic_oauth:
      enabled: true
      name: Authentik
      client_id: grafana
      client_secret: ${GRAFANA_OIDC_CLIENT_SECRET}
      scopes: openid email profile
      auth_url: https://auth.homelab.local/application/o/authorize/
      token_url: http://authentik-server.auth.svc.cluster.local/application/o/token/
      api_url: http://authentik-server.auth.svc.cluster.local/application/o/userinfo/
      role_attribute_path: contains(groups, 'authentik Admins') && 'Admin' || 'Viewer'
  initChownData:
    enabled: false
  securityContext:
    runAsUser: 472
    runAsGroup: 472
    fsGroup: 472
  persistence:
    enabled: true
    storageClassName: nfs-client
    size: 2Gi
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 512Mi
  additionalDataSources:
    - name: Loki
      type: loki
      url: http://loki.monitoring.svc.cluster.local:3100
      access: proxy
      isDefault: false
alertmanager:
  alertmanagerSpec:
    secrets:
      - alertmanager-slack-webhook
      - alertmanager-openclaw-hooks-token
    resources:
      requests:
        cpu: 25m
        memory: 32Mi
      limits:
        memory: 128Mi
  config:
    global:
      resolve_timeout: 5m
    route:
      receiver: slack-alerts
      group_by:
        - alertname
        - namespace
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      routes:
        - receiver: 'null'
          matchers:
            - alertname = "Watchdog"
        - receiver: slack-alerts
          matchers:
            - severity =~ "warning|critical"
          continue: true
        - receiver: openclaw
          matchers:
            - severity =~ "warning|critical"
    inhibit_rules:
      - source_matchers:
          - severity = "critical"
        target_matchers:
          - severity = "warning"
        equal:
          - alertname
          - namespace
    receivers:
      - name: 'null'
      - name: slack-alerts
        slack_configs:
          - api_url_file: /etc/alertmanager/secrets/alertmanager-slack-webhook/url
            channel: '#alerts'
            send_resolved: true
            title: '[{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing
              | len }}{{ end }}] {{ .CommonLabels.alertname }}'
            text: |-
              {{ range .Alerts }}
              *Alert:* {{ .Labels.alertname }} - `{{ .Labels.severity }}`
              *Namespace:* {{ if .Labels.namespace }}{{ .Labels.namespace }}{{ else }}cluster-wide{{ end }}
              *Description:* {{ if .Annotations.description }}{{ .Annotations.description }}{{ else if .Annotations.summary }}{{ .Annotations.summary }}{{ else }}No description{{ end }}
              {{ if .Labels.node }}*Node:* {{ .Labels.node }}{{ end }}
              {{ end }}
            color: '{{ if eq .Status "firing" }}{{ if eq .CommonLabels.severity "critical"
              }}danger{{ else }}warning{{ end }}{{ else }}good{{ end }}'
      - name: openclaw
        webhook_configs:
          - url: http://openclaw.openclaw.svc.cluster.local:18789/webhook/alertmanager
            send_resolved: true
            http_config:
              authorization:
                credentials_file: /etc/alertmanager/secrets/alertmanager-openclaw-hooks-token/token
nodeExporter:
  enabled: true
prometheus-node-exporter:
  resources:
    requests:
      cpu: 50m
      memory: 32Mi
    limits:
      memory: 64Mi
kubeProxy:
  enabled: false
kubeEtcd:
  enabled: false
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
prometheusOperator:
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
kubeStateMetrics:
  enabled: true
kube-state-metrics:
  podDisruptionBudget:
    maxUnavailable: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 128Mi
