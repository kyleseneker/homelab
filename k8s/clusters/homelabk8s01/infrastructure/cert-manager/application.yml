apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://charts.jetstack.io
    chart: cert-manager
    targetRevision: v1.20.0
    helm:
      valuesObject:
        crds:
          enabled: true
        config:
          enableGatewayAPI: true
        podDisruptionBudget:
          enabled: true
          maxUnavailable: 1
        cainjector:
          podDisruptionBudget:
            enabled: true
            maxUnavailable: 1
        webhook:
          podDisruptionBudget:
            enabled: true
            maxUnavailable: 1
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - ServerSideDiff=true
