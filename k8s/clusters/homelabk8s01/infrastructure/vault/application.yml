apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vault
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://helm.releases.hashicorp.com
    chart: vault
    targetRevision: 0.32.0
    helm:
      valuesObject:
        injector:
          enabled: false
        server:
          extraSecretEnvironmentVars:
            - envName: AWS_ACCESS_KEY_ID
              secretName: vault-aws-kms
              secretKey: AWS_ACCESS_KEY_ID
            - envName: AWS_SECRET_ACCESS_KEY
              secretName: vault-aws-kms
              secretKey: AWS_SECRET_ACCESS_KEY
            - envName: AWS_REGION
              secretName: vault-aws-kms
              secretKey: AWS_REGION
            - envName: VAULT_AWSKMS_SEAL_KEY_ID
              secretName: vault-aws-kms
              secretKey: VAULT_AWSKMS_SEAL_KEY_ID
          standalone:
            enabled: true
            config: |
              ui = true

              listener "tcp" {
                tls_disable = 1
                address     = "[::]:8200"
                cluster_address = "[::]:8201"
              }

              storage "file" {
                path = "/vault/data"
              }

              seal "awskms" {
                region     = "us-east-1"
                kms_key_id = "295c979e-56ee-4e73-b429-395cb657f346"
              }

          dataStorage:
            enabled: true
            size: 1Gi
            storageClass: nfs-client
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
        ui:
          enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: vault
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - ServerSideDiff=true
