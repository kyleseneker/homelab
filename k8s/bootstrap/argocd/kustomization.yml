apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: argocd

resources:
  - namespace.yml
  - https://raw.githubusercontent.com/argoproj/argo-cd/v3.3.6/manifests/install.yaml
  - ingress.yml
  - custom-ca.yml
  - argocd-notifications-slack-external-secret.yml

patches:
  - target:
      kind: ConfigMap
      name: argocd-cmd-params-cm
    patch: |
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: argocd-cmd-params-cm
      data:
        server.insecure: "true"
  - target:
      kind: ConfigMap
      name: argocd-cm
    patch: |
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: argocd-cm
      data:
        url: https://argocd.homelab.local
        resource.exclusions: |
          - apiGroups:
            - cilium.io
            kinds:
            - CiliumIdentity
            - CiliumEndpoint
            clusters:
            - "*"
        resource.customizations.ignoreDifferences.apps_Deployment: |
          jqPathExpressions:
            - .spec.template.spec.hostUsers
        resource.customizations.ignoreDifferences.batch_CronJob: |
          jqPathExpressions:
            - .spec.jobTemplate.spec.template.spec.hostUsers
        resource.customizations.ignoreDifferences.deviceplugin.intel.com_GpuDevicePlugin: |
          jqPathExpressions:
            - .spec
            - .metadata.annotations
        resource.customizations.ignoreDifferences.apiextensions.k8s.io_CustomResourceDefinition: |
          jqPathExpressions:
            - .spec.conversion
        oidc.config: |
          name: Authentik
          issuer: https://auth.homelab.local/application/o/argocd/
          clientID: argocd
          clientSecret: $oidc.authentik.clientSecret
          requestedScopes:
            - openid
            - profile
            - email
  - target:
      kind: ConfigMap
      name: argocd-rbac-cm
    patch: |
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: argocd-rbac-cm
      data:
        policy.csv: |
          g, authentik Admins, role:admin
  - target:
      kind: ConfigMap
      name: argocd-notifications-cm
    patch: |
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: argocd-notifications-cm
      data:
        service.slack: |
          token: $slack-token
        context: |
          argocdUrl: https://argocd.homelab.local
        subscriptions: |
          - recipients:
              - slack:alerts
            triggers:
              - on-sync-succeeded
              - on-sync-failed
              - on-health-degraded
        template.app-sync-succeeded: |
          slack:
            attachments: |
              [{
                "color": "#18be52",
                "title": "{{.app.metadata.name}} synced successfully",
                "title_link": "{{.context.argocdUrl}}/applications/argocd/{{.app.metadata.name}}",
                "fields": [
                  {"title": "Revision", "value": "{{.app.status.operationState.syncResult.revision | trunc 7}}", "short": true},
                  {"title": "Namespace", "value": "{{.app.spec.destination.namespace}}", "short": true}
                ]
              }]
        template.app-sync-failed: |
          slack:
            attachments: |
              [{
                "color": "#e53935",
                "title": "{{.app.metadata.name}} sync failed",
                "title_link": "{{.context.argocdUrl}}/applications/argocd/{{.app.metadata.name}}",
                "fields": [
                  {"title": "Message", "value": "{{.app.status.operationState.message}}", "short": false}
                ]
              }]
        template.app-health-degraded: |
          slack:
            attachments: |
              [{
                "color": "#f4c030",
                "title": "{{.app.metadata.name}} health degraded",
                "title_link": "{{.context.argocdUrl}}/applications/argocd/{{.app.metadata.name}}",
                "fields": [
                  {"title": "Health Status", "value": "{{.app.status.health.status}}", "short": true}
                ]
              }]
        trigger.on-sync-succeeded: |
          - when: app.status.operationState.phase in ['Succeeded']
            send: [app-sync-succeeded]
        trigger.on-sync-failed: |
          - when: app.status.operationState.phase in ['Error', 'Failed']
            send: [app-sync-failed]
        trigger.on-health-degraded: |
          - when: app.status.health.status == 'Degraded'
            send: [app-health-degraded]
  - target:
      kind: Deployment
      name: argocd-server
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: argocd-server
      spec:
        template:
          spec:
            containers:
              - name: argocd-server
                volumeMounts:
                  - name: custom-ca
                    mountPath: /etc/ssl/certs/homelab-ca.crt
                    subPath: homelab-ca.crt
                    readOnly: true
            volumes:
              - name: custom-ca
                configMap:
                  name: custom-ca-certs
