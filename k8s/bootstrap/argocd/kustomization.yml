apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: argocd

resources:
  - namespace.yml
  - https://raw.githubusercontent.com/argoproj/argo-cd/v2.13.3/manifests/install.yaml
  - ingress.yml

patches:
  - target:
      kind: ConfigMap
      name: argocd-cmd-params-cm
    patch: |
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: argocd-cmd-params-cm
      data:
        server.insecure: "true"
  - target:
      kind: ConfigMap
      name: argocd-cm
    patch: |
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: argocd-cm
      data:
        resource.exclusions: |
          - apiGroups:
            - cilium.io
            kinds:
            - CiliumIdentity
            - CiliumEndpoint
            clusters:
            - "*"
        resource.customizations.ignoreDifferences.apps_Deployment: |
          jqPathExpressions:
            - .spec.template.spec.hostUsers
        resource.customizations.ignoreDifferences.batch_CronJob: |
          jqPathExpressions:
            - .spec.jobTemplate.spec.template.spec.hostUsers
        resource.customizations.ignoreDifferences.deviceplugin.intel.com_GpuDevicePlugin: |
          jqPathExpressions:
            - .spec
        resource.customizations.ignoreDifferences.apiextensions.k8s.io_CustomResourceDefinition: |
          jqPathExpressions:
            - .spec.conversion
