apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-latest-tag
  annotations:
    policies.kyverno.io/title: Disallow Latest Tag
    policies.kyverno.io/category: Best Practices
    policies.kyverno.io/severity: medium
    policies.kyverno.io/description: >-
      Container images must not use the ':latest' tag or omit a tag entirely.
      Images should be pinned to a specific version for reproducibility.
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: validate-image-tag
      match:
        any:
          - resources:
              kinds:
                - Pod
      validate:
        message: "Container images must specify a tag and cannot use ':latest'."
        pattern:
          spec:
            containers:
              - image: "!*:latest & *:*"
