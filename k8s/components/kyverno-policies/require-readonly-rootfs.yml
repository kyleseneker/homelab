apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-readonly-rootfs
  annotations:
    policies.kyverno.io/title: Require Read-Only Root Filesystem
    policies.kyverno.io/category: Best Practices
    policies.kyverno.io/severity: medium
    policies.kyverno.io/description: >-
      Containers should use a read-only root filesystem to prevent modification
      of the container filesystem at runtime.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: validate-readonly-rootfs
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kyverno
                - argocd
                - metallb-system
                - cilium-test-*
                - arr
                - auth
                - backups
                - monitoring
                - nfs-provisioner
      validate:
        message: "Containers must set securityContext.readOnlyRootFilesystem to true."
        pattern:
          spec:
            containers:
              - securityContext:
                  readOnlyRootFilesystem: true
