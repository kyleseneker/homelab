apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: homelab-gateway
  namespace: default
  annotations:
    cert-manager.io/cluster-issuer: homelab-ca-issuer
spec:
  gatewayClassName: cilium
  addresses:
    - type: IPAddress
      value: "192.168.10.200"
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      hostname: "*.homelab.local"
      tls:
        mode: Terminate
        certificateRefs:
          - name: homelab-gateway-tls
      allowedRoutes:
        namespaces:
          from: All
    - name: http
      protocol: HTTP
      port: 80
      hostname: "*.homelab.local"
      allowedRoutes:
        namespaces:
          from: All
