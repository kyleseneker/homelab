---
- name: Check if node is already joined
  ansible.builtin.stat:
    path: /etc/kubernetes/kubelet.conf
  register: k8s_worker_kubelet_conf

- name: Join the Kubernetes cluster
  ansible.builtin.command: "{{ hostvars[groups['control_plane'][0]].k8s_control_plane_join_command }}"
  changed_when: true
  no_log: true
  when: not k8s_worker_kubelet_conf.stat.exists

- name: Wait for node to be ready
  ansible.builtin.command: >
    kubectl get node {{ inventory_hostname }}
    --kubeconfig=/etc/kubernetes/admin.conf
    -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}'
  register: k8s_worker_node_ready
  retries: 20
  delay: 10
  until: k8s_worker_node_ready.stdout == "True"
  changed_when: false
  delegate_to: "{{ groups['control_plane'][0] }}"

- name: Check GPU label on node
  ansible.builtin.command: >
    kubectl get node {{ inventory_hostname }}
    -o jsonpath='{.metadata.labels.gpu}'
  delegate_to: "{{ groups['control_plane'][0] }}"
  register: k8s_worker_gpu_label
  changed_when: false
  failed_when: false
  when: "'gpu' in group_names"

- name: Label GPU nodes
  ansible.builtin.command: >
    kubectl label node {{ inventory_hostname }}
    gpu=intel
    intel.feature.node.kubernetes.io/gpu=true
    --overwrite
  delegate_to: "{{ groups['control_plane'][0] }}"
  changed_when: true
  when: "'gpu' in group_names and (k8s_worker_gpu_label.stdout | default('')) != 'intel'"
