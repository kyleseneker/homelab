---
- name: Create tfc-agent group
  ansible.builtin.group:
    name: "{{ tfc_agent_group }}"
    system: true
    state: present

- name: Create tfc-agent user
  ansible.builtin.user:
    name: "{{ tfc_agent_user }}"
    group: "{{ tfc_agent_group }}"
    system: true
    shell: /usr/sbin/nologin
    home: "{{ tfc_agent_install_dir }}"
    create_home: false

- name: Create install directory
  ansible.builtin.file:
    path: "{{ tfc_agent_install_dir }}"
    state: directory
    owner: "{{ tfc_agent_user }}"
    group: "{{ tfc_agent_group }}"
    mode: "0755"

- name: Create data directory
  ansible.builtin.file:
    path: "{{ tfc_agent_data_dir }}"
    state: directory
    owner: "{{ tfc_agent_user }}"
    group: "{{ tfc_agent_group }}"
    mode: "0755"

- name: Install unzip
  ansible.builtin.apt:
    name: unzip
    state: present

- name: Download tfc-agent
  ansible.builtin.get_url:
    url: "https://releases.hashicorp.com/tfc-agent/{{ tfc_agent_version }}/tfc-agent_{{ tfc_agent_version }}_linux_amd64.zip"
    dest: "/tmp/tfc-agent_{{ tfc_agent_version }}.zip"
    mode: "0644"

- name: Extract tfc-agent binary
  ansible.builtin.unarchive:
    src: "/tmp/tfc-agent_{{ tfc_agent_version }}.zip"
    dest: "{{ tfc_agent_install_dir }}"
    remote_src: true
    owner: "{{ tfc_agent_user }}"
    group: "{{ tfc_agent_group }}"
  notify: Restart tfc-agent

- name: Set binary permissions
  ansible.builtin.file:
    path: "{{ tfc_agent_install_dir }}/tfc-agent"
    owner: "{{ tfc_agent_user }}"
    group: "{{ tfc_agent_group }}"
    mode: "0755"

- name: Deploy systemd unit
  ansible.builtin.template:
    src: tfc-agent.service.j2
    dest: /etc/systemd/system/tfc-agent.service
    owner: root
    group: root
    mode: "0644"
  notify: Restart tfc-agent

- name: Deploy environment file
  ansible.builtin.template:
    src: tfc-agent.env.j2
    dest: /etc/tfc-agent.env
    owner: root
    group: root
    mode: "0600"
  no_log: true
  notify: Restart tfc-agent

- name: Enable and start tfc-agent
  ansible.builtin.systemd:
    name: tfc-agent
    enabled: true
    state: started
    daemon_reload: true
