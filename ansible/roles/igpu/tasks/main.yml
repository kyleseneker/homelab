---
- name: Install kernel extra modules for i915
  ansible.builtin.apt:
    name:
      - "linux-modules-extra-{{ ansible_kernel }}"
    state: present
  register: kernel_modules_install

- name: Load i915 module
  community.general.modprobe:
    name: i915
    state: present

- name: Persist i915 module across reboots
  ansible.builtin.lineinfile:
    path: /etc/modules-load.d/igpu.conf
    line: i915
    create: true
    mode: "0644"

- name: Install Intel GPU user-space drivers
  ansible.builtin.apt:
    name:
      - intel-media-va-driver-non-free
      - vainfo
    state: present

- name: Verify iGPU render device exists
  ansible.builtin.stat:
    path: /dev/dri/renderD128
  register: igpu_device

- name: Fail if iGPU device not found
  ansible.builtin.fail:
    msg: >
      /dev/dri/renderD128 not found. Ensure iGPU PCI passthrough is configured
      in Proxmox and the VM has been rebooted.
  when: not igpu_device.stat.exists

- name: Set permissions on /dev/dri devices
  ansible.builtin.file:
    path: "{{ item }}"
    mode: "0666"
  loop:
    - /dev/dri/card0
    - /dev/dri/renderD128
  when: igpu_device.stat.exists

- name: Create udev rule for persistent /dev/dri permissions
  ansible.builtin.copy:
    dest: /etc/udev/rules.d/99-intel-gpu.rules
    content: |
      KERNEL=="card[0-9]*", SUBSYSTEM=="drm", MODE="0666"
      KERNEL=="renderD*", SUBSYSTEM=="drm", MODE="0666"
    mode: "0644"
  notify: Reload udev rules
