---
- name: Base setup for all K8s nodes
  hosts: k8s_cluster
  become: true
  roles:
    - role: base
      when: not (packer_template | default(true))
    - role: k8s-prereqs
      when: not (packer_template | default(true))
    - nfs

- name: Intel iGPU setup on GPU nodes
  hosts: gpu
  become: true
  roles:
    - igpu

- name: Initialize Kubernetes control plane
  hosts: control_plane
  become: true
  roles:
    - k8s-control-plane

- name: Join worker nodes to the cluster
  hosts: workers
  become: true
  roles:
    - k8s-worker
